name: Build Virtual Container

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone target repository
        run: |
          git clone https://github.com/vishal-benake/Virtual-Container-for-Android.git source

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permissions
        run: |
          cd source
          chmod +x gradlew

      - name: Build APK
        run: |
          cd source
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: source/app/build/outputs/apk/debug/*.apk
      # Licenses
      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # NDK + CMake
      - name: Install NDK + CMake
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "ndk;26.3.11579264"
          sdkmanager "cmake;3.22.1"

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Permissions
      - name: Make scripts executable
        run: chmod +x PixelSpark/scripts/*.sh

      # Run ORIGINAL build script
      - name: Run Production Builder
        working-directory: PixelSpark
        run: |
          bash scripts/build_production.sh || true

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelSpark-APK
          path: |
            PixelSpark/frontend/build/app/outputs/flutter-apk/*.apk

      # Upload symbols
      - name: Upload Symbols
        uses: actions/upload-artifact@v4
        with:
          name: PixelSpark-Symbols
          path: |
            PixelSpark/frontend/build/app/outputs/symbols
