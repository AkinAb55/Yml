name: Build HackThe6ix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target project
        uses: actions/checkout@v4
        with:
          repository: the-ericwang35/HackThe6ix
          ref: master          # ← Вот здесь было main
          path: HackThe6ix

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build with Gradle
        working-directory: ./HackThe6ix
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HackThe6ix-APK
          path: HackThe6ix/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
