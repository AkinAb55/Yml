name: Build wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Выкачиваем все вложенные зависимости (wlroots, labwc)

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK r28
      run: |
        sdkmanager --install "ndk;28.0.12433566"
        # Прописываем пути, чтобы Gradle и CMake внутри него знали, где искать компилятор
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" > local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Android APK via Gradle (Native build included)
      run: |
        # Запускаем сборку. Gradle сам зайдет в нужные папки, 
        # вызовет CMake/Meson для subprojects и соберет .so библиотеки
        ./gradlew assembleDebug --stacktrace

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
