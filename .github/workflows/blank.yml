name: Build Glory Cam APK (External)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      # 1. Клонируем репозиторий (он развернется прямо в корень)
      - name: Checkout external code
        uses: actions/checkout@v4
        with:
          repository: 'tharushaperera104-create/glory-cam-v2-glory-studio'
          ref: 'main'

      # 2. Устанавливаем Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Устанавливаем сам Gradle в систему
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      # 4. Генерируем отсутствующий gradlew wrapper прямо в корне
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper

      # 5. Создаем local.properties в корне для Android SDK
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # 6. Собираем отладочный APK
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache

      # 7. Выгружаем готовый APK в артефакты
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: glory-cam-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 8. Сохраняем логи в случае неудачи
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            app/build/reports/
          retention-days: 7
