name: Build Remote Engine to APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Клонируем целевой репозиторий напрямую, минуя форк
      - name: Clone Target Repository
        run: |
          git clone --depth=1 https://github.com/geterrorcode-me/vcore.git .

      # 2. Магия: Создаем на лету dummy-приложение (модуль app), чтобы получить APK
      - name: Inject APK Application Module
        run: |
          # Включаем модуль :app в настройки проекта
          echo "include ':app'" >> settings.gradle
          
          # Создаем структуру папок для приложения
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main
          
          # Генерируем build.gradle для приложения с зависимостью от :vcore
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.vcoreapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.vcoreapp"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation project(':vcore')
          }
          EOF

          # Генерируем минимальный AndroidManifest.xml
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="VCore Test App" android:hasCode="false">
              </application>
          </manifest>
          EOF

      # 3. Настраиваем Java среду
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 4. Даем права на запуск Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Собираем проект (теперь собираем :app:assembleRelease для получения APK)
      - name: Build APK
        run: ./gradlew :app:assembleRelease

      # 6. Выгружаем готовый APK в артефакты GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCore-Built-APK
          path: app/build/outputs/apk/release/*.apk
