name: Build External Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из чужого репозитория
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: 'malsmak372-cmyk/vidi-ai-ultimate-editor'
        ref: 'main'

    # 2. Устанавливаем Java 17 для sdkmanager
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Настраиваем Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. Устанавливаем Java 8 для сборки самого приложения
    - name: Set up JDK 8 for Build
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # 5. Скачиваем старый Gradle, который умеет работать с Java 8, и собираем проект
    - name: Download Gradle and Build
      run: |
        # Скачиваем архив со старым Gradle 6.9.4
        wget -q https://services.gradle.org/distributions/gradle-6.9.4-bin.zip
        unzip -q gradle-6.9.4-bin.zip
        
        # Переключаем окружение на Java 8
        export JAVA_HOME=$JAVA_HOME_8_X64
        export PATH=$JAVA_HOME/bin:$GITHUB_WORKSPACE/gradle-6.9.4/bin:$PATH
        
        # Генерируем локальный wrapper старой версии
        gradle wrapper --gradle-version 6.9.4
        chmod +x gradlew
        
        # Запускаем сборку
        ./gradlew assembleDebug --stacktrace

    # 6. Сохраняем APK файлы
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-apks
        path: app/build/outputs/apk/debug/*.apk
