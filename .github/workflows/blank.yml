name: Build External Android Project

on:
  workflow_dispatch: # Позволяет запускать сборку вручную через вкладку Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем сторонний репозиторий вместо вашего
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: 'VenInDays/ChatAI-Android'
          ref: 'main' # Укажите нужную ветку, если там не main (например, master)

      # 2. Настраиваем Java (для Android обычно нужна версия 17 или 11/21 в зависимости от Gradle)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      # 3. Даем права на выполнение Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Собираем проект (Debug APK)
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Сохраняем готовый APK как артефакт сборки
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatAI-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
