name: xwayland-debug-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      DEBIAN_FRONTEND: noninteractive
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT (CRITICAL)
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 2. SYSTEM TOOLS
      # ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            bash \
            coreutils \
            git \
            curl \
            pkg-config \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            xsltproc \
            python3 \
            python3-pip \
            libxml2-utils \
            perl \
            make \
            gcc \
            g++

      # ─────────────────────────────────────────────
      # 3. ANDROID NDK
      # ─────────────────────────────────────────────
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          set -euxo pipefail

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.14206865"

          NDK_PATH=$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 | sort -V | tail -1)

          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 4. VERIFY ENV
      # ─────────────────────────────────────────────
      - name: Debug environment
        run: |
          set -euxo pipefail

          echo "NDK:"
          ls -la "$ANDROID_NDK_HOME"

          echo "TOOLS:"
          which meson
          which ninja
          which autoreconf
          which pkg-config
          which python3

          meson --version
          ninja --version

      # ─────────────────────────────────────────────
      # 5. RUN BUILD WITH FULL TRACE
      # ─────────────────────────────────────────────
      - name: Run Xwayland build (TRACE MODE)
        continue-on-error: true
        run: |
          set -Eeuxo pipefail

          mkdir -p logs

          export PS4='+ ${BASH_SOURCE}:${LINENO}: '

          bash -x scripts/build-xwayland.sh \
            2>&1 | tee logs/build.log

      # ─────────────────────────────────────────────
      # 6. TREE DUMP
      # ─────────────────────────────────────────────
      - name: Dump build tree
        if: always()
        run: |
          set +e

          echo "===== BUILD DIR ====="
          find build -maxdepth 4 -type d 2>/dev/null || true

          echo "===== XWAYLAND SRC ====="
          find deps/xwayland-src -maxdepth 3 2>/dev/null || true

      # ─────────────────────────────────────────────
      # 7. MESON LOGS
      # ─────────────────────────────────────────────
      - name: Collect meson logs
        if: always()
        run: |
          set +e

          find . -name meson-log.txt -exec sh -c '
            echo "========== {} =========="
            cat {}
          ' \;

      # ─────────────────────────────────────────────
      # 8. CONFIG LOGS (AUTOTOOLS)
      # ─────────────────────────────────────────────
      - name: Collect config logs
        if: always()
        run: |
          set +e

          find . -name config.log -exec sh -c '
            echo "========== {} =========="
            tail -200 {}
          ' \;

      # ─────────────────────────────────────────────
      # 9. UPLOAD ARTIFACTS
      # ─────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-debug-logs
          path: |
            logs/
            build/
            deps/xwayland-src/**/meson-log.txt
            deps/xwayland-src/**/config.log
