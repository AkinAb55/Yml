name: Build ShadowCore

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Получаем исходники напрямую из ShadowCore
      - name: Checkout ShadowCore
        uses: actions/checkout@v4
        with:
          repository: ReturnKartikey/ShadowCore
          ref: main

      # Устанавливаем JDK 17 (Gradle 9.4.1 требует >=17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Кэшируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Делаем gradlew исполняемым
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Запускаем сборку (lint не будет падать)
      - name: Build with Gradle
        run: ./gradlew assembleDebug -Pandroid.lint.abortOnError=false

      # Публикуем артефакты (APK из app/build/outputs/apk)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shadowcore-apk
          path: app/build/outputs/apk/**/*.apk
          
