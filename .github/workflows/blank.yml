name: Remote Build WayLandIE

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка для сборки (branch или tag)'
        required: true
        default: 'main'
      build_type:
        description: 'Тип сборки (Release / Debug)'
        required: true
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем целевой репозиторий AstroCODEsky напрямую, без форка
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'AstroCODEsky/WayLandIE'
        ref: ${{ github.event.inputs.branch }}
        submodules: 'recursive' # На случай, если внутри есть submodules (например, wayland-protocols)

    # 2. Настраиваем Android NDK (необходимо для компиляции под Android / bionic / Termux архитектуру)
    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.2.9519653' # Стабильная версия NDK, часто используемая в Termux-компиляциях

    # 3. Устанавливаем необходимые зависимости сборки (Wayland-scanner, Meson, Ninja, CMake)
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build meson wayland-protocols libwayland-dev pkg-config

    # 4. Внутренняя логика сборки (адаптируйте шаги под архитектуру проекта)
    # Проект может использовать как классический CMake, так и скрипты для сборки APK/бинарников.
    - name: Compile WayLandIE
      run: |
        # Проверяем структуру проекта и выбираем стратегию сборки
        if [ -f "CMakeLists.txt" ]; then
          echo "Обнаружен CMakeLists.txt. Запуск CMake сборки для Android (arm64-v8a)..."
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} ..
          ninja
        elif [ -f "build.sh" ]; then
          echo "Обнаружен кастомный скрипт сборки build.sh. Запуск..."
          chmod +x build.sh
          ./build.sh
        elif [ -f "gradlew" ]; then
          echo "Обнаружен Android проект (Gradle). Сборка APK..."
          chmod +x gradlew
          ./gradlew assembleRelease
        else
          echo "Специфичный файл сборки не найден. Пробуем стандартный ndk-build или Meson..."
          # Если проект использует meson (стандарт для Wayland)
          if [ -f "meson.build" ]; then
            meson setup build --cross-file=cross-android.txt # Если присутствует кросс-файл
            ninja -C build
          fi
        fi

    # 5. Поиск и сбор собранных артефактов (бинарники, библиотеки .so или .apk)
    - name: Prepare Artifacts
      run: |
        mkdir ./output
        # Ищем любые скомпилированные бинарники, .apk файлы или разделяемые библиотеки .so
        find . -type f \( -name "*.apk" -o -name "waylandie" -o -name "*.so" \) ! -path "*/.git/*" ! -path "./output/*" -exec cp {} ./output/ \;
        echo "Сборка завершена. Найденные файлы:"
        ls -la ./output/

    # 6. Загрузка готовых файлов в интерфейс GitHub Actions
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WayLandIE-${{ github.event.inputs.build_type }}-arm64
        path: ./output/
