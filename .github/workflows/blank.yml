name: Wayland 1.25 Clean Isolation Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      WAYLAND_PREFIX: /tmp/wayland-host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools (NO WAYLAND DEV LIBS)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git meson ninja-build pkg-config \
            autoconf automake libtool libtool-bin m4 gettext \
            python3 curl

      - name: Build Wayland 1.25 (HOST scanner + libs isolated)
        run: |
          set -e

          rm -rf /tmp/wayland-src /tmp/wayland-host
          mkdir -p /tmp/wayland-src /tmp/wayland-host

          curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz \
            | tar -xz -C /tmp/wayland-src --strip-components=1

          cd /tmp/wayland-src

          meson setup build \
            --prefix=/tmp/wayland-host \
            -Ddocumentation=false \
            -Dtests=false \
            -Dlibraries=true

          ninja -C build
          ninja -C build install

      - name: HARD PKG-CONFIG ISOLATION (CRITICAL FIX)
        run: |
          echo "PKG_CONFIG_PATH=" >> $GITHUB_ENV

          echo "PKG_CONFIG_LIBDIR=${WAYLAND_PREFIX}/lib/pkgconfig:${WAYLAND_PREFIX}/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV

      - name: VERIFY ISOLATION
        run: |
          echo "=== scanner ==="
          which wayland-scanner

          echo "=== pkg-config search paths ==="
          pkg-config --variable pc_path pkg-config

          echo "=== wayland modules ==="
          pkg-config --modversion wayland-client
          pkg-config --modversion wayland-server
          pkg-config --modversion wayland-egl

      - name: Show EGL availability
        run: |
          pkg-config --exists wayland-egl && echo "WAYLAND EGL OK" || echo "WAYLAND EGL MISSING"

      - name: Dump prefix
        run: |
          find /tmp/wayland-host -type f | sort | head -200
