name: Remote Build WayLandIE

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка или тег для сборки'
        required: true
        default: 'main'

jobs:
  build-assets:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем репозиторий AstroCODEsky напрямую
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'AstroCODEsky/WayLandIE'
        ref: ${{ github.event.inputs.branch }}
        submodules: 'recursive'

    # 2. Настраиваем Java (необходима для работы Gradle и сборки Android-приложений)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. Настраиваем Android SDK и NDK (так как проект использует SurfaceControl и Vulkan)
    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.2.9519653' # Стандартная стабильная версия NDK

    # 4. Собираем Android APK через Gradle (эквивалент build-apk.ps1 для Linux)
    - name: Build Android App (APK)
      run: |
        cd android-app
        # Делаем градл-скрипт исполняемым в Linux-окружении
        chmod +x gradlew
        # Запускаем сборку релизного APK
        ./gradlew assembleRelease --no-daemon

    # 5. Собираем все артефакты в единую структуру для отправки на телефон
    - name: Prepare Release Bundle
      run: |
        mkdir -p ./release-dist/android-app
        mkdir -p ./release-dist/linux-runtime
        mkdir -p ./release-dist/scripts
        
        # Копируем собранный APK (ищем его в стандартных путях сборки Gradle)
        find android-app/ -name "*.apk" -exec cp {} ./release-dist/android-app/ \;
        
        # Копируем рантайм и скрипты (они понадобятся на стороне телефона/Termux)
        cp -r linux-runtime/* ./release-dist/linux-runtime/
        cp -r scripts/* ./release-dist/scripts/
        cp README.md ./release-dist/ || true
        
        echo "=== Содержимое готового релиза ==="
        ls -R ./release-dist/

    # 6. Загружаем готовый архив в артефакты GitHub Actions
    - name: Upload Complete WayLandIE Bundle
      uses: actions/upload-artifact@v4
      with:
        name: WayLandIE-Full-Bundle
        path: ./release-dist/
