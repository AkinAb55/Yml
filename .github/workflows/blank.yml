name: Build Android APK (Prebuild)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout raw-eye repo
        uses: actions/checkout@v4
        with:
          repository: rahul-harsha-89/raw-eye
          ref: master

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Android SDK + NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Generate native project
        run: npx expo prebuild

      - name: Download ESRGAN TFLite model
        run: |
          mkdir -p assets/models
          curl -L "https://raw.githubusercontent.com/google-ai-edge/mediapipe-samples/main/examples/super_resolution/android/app/src/main/assets/ESRGAN.tflite" -o assets/models/esrgan.tflite || touch assets/models/esrgan.tflite

      - name: Build APK with Gradle
        run: cd android && ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAWEye-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
