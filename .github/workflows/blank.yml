name: Debug TAWC Xwayland Only

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"

jobs:
  test-xwayland-fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: recursive

      - name: Install Host Build Tools & Autotools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake meson ninja-build pkg-config \
            autoconf automake libtool libtool-bin m4 gettext bison flex \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu curl tar

      - name: Setup Android NDK via SDKManager
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          REAL_NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$REAL_NDK_PATH" ]; then REAL_NDK_PATH="$ANDROID_HOME/ndk-bundle"; fi
          echo "ANDROID_NDK_HOME=$REAL_NDK_PATH" >> $GITHUB_ENV

      - name: Pre-download Vendored Dependencies
        run: |
          set -ex
          chmod +x scripts/ensure-deps.sh
          # Принудительно скачиваем необходимые исходники в deps/ до начала сборки и модификаций
          ./scripts/ensure-deps.sh wayland libffi xwayland pixman libdrm xkeyboard-config

      - name: Upgrade libffi and Hotfix build script
        run: |
          set -ex
          # 1. Переключаем манифест TAWC на сборку libffi v3.6.0
          sed -i 's|e2eda0cf72a0598b44278cc91860ea402273fa29\tv3.5.2|f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf\tv3.6.0|g' deps/deps.list
          
          # 2. Обновляем сам локальный git-репозиторий libffi до v3.6.0, чтобы пройти внутреннюю проверку коммитов
          git -C deps/xwayland-src/libffi fetch origin f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf
          git -C deps/xwayland-src/libffi checkout f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf
          
          # 3. Безопасная модификация configure.ac для libffi (устранение ошибки LT_SYS_SYMBOL_USCORE)
          sed -i '/build_autotools libffi/i \  sed -i "s|LT_SYS_SYMBOL_USCORE|sys_symbol_underscore=no|g" deps/xwayland-src/libffi/configure.ac' scripts/build-xwayland.sh
          
          # 4. Внедряем путь к нашему wayland-scanner ОДИН РАЗ прямо в шаблон генерации кросс-файла gen_meson_cross
          sed -i "s|pkg-config = 'pkg-config'|pkg-config = 'pkg-config'\nwayland-scanner = '/home/runner/.local/bin/wayland-scanner'|g" scripts/build-xwayland.sh
          
          echo "=== Проверка шаблона генерации android-cross.ini ==="
          grep -C 5 "wayland-scanner" scripts/build-xwayland.sh

      - name: Build Host Wayland Scanner (v1.25.0)
        run: |
          set -ex
          mkdir -p build-host-wayland
          
          # Конфигурируем Wayland для хоста. Оставляем генерацию целей, но отключаем тесты и доки
          meson setup build-host-wayland deps/xwayland-src/wayland \
            -Dscanner=true \
            -Dtests=false \
            -Ddocumentation=false \
            -Ddtd_validation=false
          
          # Собираем конкретный таргет сканнера (находится внутри подпапки src)
          ninja -C build-host-wayland src/wayland-scanner
          
          # Переносим готовый бинарник в изолированную структуру bin
          mkdir -p $HOME/.local/bin
          cp build-host-wayland/src/wayland-scanner $HOME/.local/bin/
          chmod +x $HOME/.local/bin/wayland-scanner
          
          # Проверяем успешность сборки и версию утилиты
          $HOME/.local/bin/wayland-scanner --version

      - name: Fix Autotools Environment Globally
        run: |
          echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
          echo "VERBOSE=1" >> $GITHUB_ENV

      - name: Run TAWC Xwayland Build (Trace Mode)
        run: |
          find . -name "*.sh" -exec chmod +x {} + 2>/dev/null || true
          export ANDROID_NDK_HOME="${{ env.ANDROID_NDK_HOME }}"
          bash -x scripts/build-xwayland.sh --abi=aarch64
