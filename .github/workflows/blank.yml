name: Build Android App from Fork

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из вашего форка приложения
    - name: Checkout Android Project
      uses: actions/checkout@v4
      with:
        repository: 'AkinAb55/vidi-ai-ultimate-editor'
        ref: 'main'

    # 2. Устанавливаем Java 17 для утилит SDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Настраиваем Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. Устанавливаем Java 8 для сборки приложения
    - name: Set up JDK 8 for Legacy Gradle
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # 5. ХАК: Жестко прописываем архивные репозитории, где точно лежит http-builder
    - name: Force inject Maven Repo for Bintray Plugin
      run: |
        # Перезаписываем блок repositories в buildscript корневого build.gradle,
        # добавляя гарантированно рабочие пути для скачивания древних зависимостей.
        sed -i '/buildscript {/,/}/ {
          s/repositories {/repositories {\n        maven { url "https:\/\/repo1.maven.org\/maven2\/" }\n        mavenCentral()/
        }' build.gradle
        echo "=== Patched build.gradle content ==="
        cat build.gradle

    # 6. Запускаем сборку
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}

    # 7. Сохраняем готовые файлы
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-apks
        path: app/build/outputs/apk/debug/*.apk
  
