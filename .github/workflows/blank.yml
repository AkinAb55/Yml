name: Build Wldroid Test App APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Original Wldroid Repository
        uses: actions/checkout@v4
        with:
          repository: 'Shelnutt2/wldroid'
          ref: 'main'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up Python (Required for Meson)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Native Build Tools (Meson & Ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config wayland-protocols
          pip install meson

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r28
        run: |
          sdkmanager --install "ndk;28.0.12433566"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # Запускаем фоновый демон-патчер, который караулит появление файла от Meson
      - name: Run Background Live Patcher for wlroots
        run: |
          cat << 'EOF' > patcher.sh
          #!/bin/bash
          TARGET_FILE="compositor/native/subprojects/wlroots/render/meson.build"
          echo "Live Patcher started. Waiting for $TARGET_FILE..."
          
          # Цикл ожидания (максимум 5 минут)
          for i in {1..300}; do
            if [ -f "$TARGET_FILE" ]; then
              echo "Found $TARGET_FILE! Applying patch..."
              # Жестко перезаписываем переменную версии EGL прямо перед проверкой
              sed -i "s/egl_ext_version =.*/egl_ext_version = '20240000'/g" "$TARGET_FILE"
              # На всякий случай добавим строку сразу после вызова get_define
              sed -i "/get_define('EGL_EGLEXT_VERSION'/a \ \ egl_ext_version = '20240000'" "$TARGET_FILE"
              echo "Patch successfully applied!"
              cat "$TARGET_FILE" | grep -n "egl_ext_version" || true
              exit 0
            fi
            sleep 1
          done
          echo "Timeout: File $TARGET_FILE not found."
          exit 1
          EOF
          chmod +x patcher.sh
          ./patcher.sh & # Запуск в фоне через амперсанд

      - name: Build Test App APK
        run: ./gradlew :testapp:assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wldroid-testapp-debug
          path: testapp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
