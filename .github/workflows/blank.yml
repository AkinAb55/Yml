name: Build Virtual Container

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone https://github.com/vishal-benake/Virtual-Container-for-Android.git source

      # Java 17 для sdkmanager
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required NDK
        run: |
          sdkmanager "ndk;21.0.6113669"

      # Java 11 для Gradle
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Fix gradlew permission
        run: |
          cd source
          chmod +x gradlew

      - name: Remove broken signing config
        run: |
          cd source

          sed -i '/storeFile file/d' app/build.gradle
          sed -i '/storePassword/d' app/build.gradle
          sed -i '/keyAlias/d' app/build.gradle
          sed -i '/keyPassword/d' app/build.gradle

      - name: Build Debug APK
        run: |
          cd source
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: source/app/build/outputs/apk/debug/*.apk
