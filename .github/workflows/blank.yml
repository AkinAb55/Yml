name: Build Virtual Container

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone https://github.com/vishal-benake/Virtual-Container-for-Android.git source

      # Java 17 нужен sdkmanager
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-29" \
            "build-tools;29.0.2" \
            "ndk;21.0.6113669"

      # Java 11 нужен Gradle 6.5
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Fix gradlew permission
        run: |
          cd source
          chmod +x gradlew

      # Добавляем repositories
      - name: Add repositories
        run: |
          cd source

          find . -name "*.gradle" -type f | while read file; do
            sed -i '/repositories {/a\
                google()\
                mavenCentral()\
                maven { url "https://jitpack.io" }\
                jcenter()
            ' "$file"
          done

      # Заменяем мёртвую dependency
      - name: Replace dead free_reflection dependency
        run: |
          cd source

          find . -name "build.gradle" -type f | while read file; do
            sed -i 's/me.weishu:free_reflection:3.0.1/com.github.tiann:FreeReflection:3.1.0/g' "$file"
          done

      # Удаляем битые Windows signing configs
      - name: Remove broken signing configs
        run: |
          cd source

          find . -name "build.gradle" -type f | while read file; do
            sed -i '/storeFile file/d' "$file"
            sed -i '/storePassword/d' "$file"
            sed -i '/keyAlias/d' "$file"
            sed -i '/keyPassword/d' "$file"
            sed -i '/signingConfig signingConfigs.debug/d' "$file"
          done

      # Fix старых Gradle repos
      - name: Replace jcenter
        run: |
          cd source

          find . -name "*.gradle" -type f | while read file; do
            sed -i 's/jcenter()/mavenCentral()/g' "$file"
          done

      # Глобальные repositories
      - name: Patch root build.gradle
        run: |
          cd source

          sed -i '/allprojects {/a\
              repositories {\
                  google()\
                  mavenCentral()\
                  maven { url "https://jitpack.io" }\
                  jcenter()\
              }
          ' build.gradle

      - name: Build Debug APK
        run: |
          cd source
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            source/app/build/outputs/apk/debug/*.apk
            source/**/build/outputs/apk/debug/*.apk
