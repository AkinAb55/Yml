name: Debug Xwayland Build

on:
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"
  TAWC_ABIS: "arm64-v8a"

jobs:
  xwayland-debug:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: recursive

      - name: Install ALL host tools (усилено для Xwayland)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake meson ninja-build pkg-config \
            autoconf automake libtool libtool-bin \
            perl xsltproc gettext xutils-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxcb1-dev libxcb-xkb-dev libx11-xcb-dev \
            libffi-dev libegl1-mesa-dev libgles-dev libdrm-dev libepoxy-dev \
            curl unzip bc patchelf bison flex texinfo gperf \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            pkgconf
        shell: bash

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}

      - name: Export env
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=\( {ANDROID_SDK_ROOT}/ndk/ \){ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "PATH=\( {HOME}/.local/bin: \){PATH}" >> $GITHUB_PATH

      - name: Ensure deps
        run: |
          ./scripts/ensure-deps.sh --verify-all || true
          ./scripts/ensure-deps.sh xwayland-src libhybris || true

      - name: Build Xwayland Arm64 (с максимальным выводом)
        run: |
          set -x
          echo "=== Starting Xwayland build ==="
          bash -x scripts/build-xwayland.sh --abi=aarch64 --clean 2>&1 | tee xwayland-build.log
          echo "=== Build finished. Exit code: $? ==="
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-build-log
          path: xwayland-build.log
