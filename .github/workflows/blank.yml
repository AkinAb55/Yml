name: Debug Font-Util and Macros ONLY

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool libtool-bin \
            autoconf-archive m4 pkg-config git curl

      - name: Prepare Build Scripts & Deps
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/ensure-deps.sh --verify-all

      - name: Overwrite with Targeted build-xwayland.sh
        run: |
          cat > scripts/build-xwayland.sh << 'EOF'
          #!/bin/bash
          set -exuo pipefail
          
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          REPO_DIR="$(cd "$SCRIPT_DIR/.." && pwd)"
          source "$SCRIPT_DIR/lib/deps.sh"
          
          SRC_ROOT="$REPO_DIR/deps/xwayland-src"
          PATCH_ROOT="$REPO_DIR/deps/xwayland-patches"
          TAWC_TMP_PREFIX="share/xtmp"
          ABI=aarch64
          
          OUT_DIR="$REPO_DIR/build/xwayland-$ABI"
          PREFIX="$OUT_DIR/install"
          PC_DIR="$PREFIX/lib/pkgconfig"
          TRIPLE=aarch64-linux-android
          
          mkdir -p "$SRC_ROOT" "$PREFIX/lib" "$PREFIX/include" "$PREFIX/share" "$PC_DIR"
          export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16:$PREFIX/share/aclocal"
          
          clone_pinned() {
              local name="$1"
              local patch_dir="$PATCH_ROOT/$name"
              dep_apply_patches "$name" "$patch_dir" "s|@TAWC_TMP_PREFIX@|$TAWC_TMP_PREFIX|g"
          }
          
          # 1. Сборка утилит макросов (БЕЗ autoheader!)
          stage_xorg_macros() {
              clone_pinned util-macros
              ( cd "$SRC_ROOT/util-macros" && \
                if [ ! -f configure ]; then \
                    aclocal && autoconf && automake --add-missing --copy || true; \
                fi && \
                ./configure --prefix="$PREFIX" && \
                make install )
          }
          
          # 2. Сборка проблемного font-util (С принудительным autoheader)
          stage_font_util() {
              clone_pinned font-util
              ( cd "$SRC_ROOT/font-util" && \
                if [ ! -f configure ]; then \
                    aclocal -I m4 -I /usr/share/aclocal --force && \
                    autoheader --force && \
                    autoconf --force && \
                    automake --add-missing --copy --foreign || true; \
                fi && \
                ./configure --prefix="$PREFIX" && \
                make install )
          }
          
          # Запускаем ТОЛЬКО эту изолированную связку
          stage_xorg_macros
          stage_font_util
          
          echo "==> Изолированный тест завершен!"
          EOF
          chmod +x scripts/build-xwayland.sh

      - name: Run Target Test
        run: |
          export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16"
          ./scripts/build-xwayland.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
