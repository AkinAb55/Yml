name: Build External wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout External Repository with Submodules
      uses: actions/checkout@v4
      with:
        repository: 'Xtr126/wlroots-android-bridge'
        submodules: 'recursive' 

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK (Exact version required by project)
      run: |
        sdkmanager --install "ndk;28.0.13004108"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.13004108" >> $GITHUB_ENV
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/28.0.13004108" > local.properties

    - name: Create Gradle Init Script to Force JVM Target 17
      run: |
        # Этот скрипт принудительно выравнивает версии Java для всех модулей на лету
        cat << 'EOF' > init.gradle
        allprojects {
            tasks.withType(JavaCompile).configureEach {
                sourceCompatibility = "17"
                targetCompatibility = "17"
            }
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                compilerOptions {
                    jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
                }
            }
        }
        EOF

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        else
          echo "Критическая ошибка: gradlew не найден!"
          exit 1
        fi

    - name: Build Android APK via Gradle
      run: |
        # Подключаем созданный init-script, который исправит конфликт версий
        ./gradlew assembleDebug --init-script init.gradle --stacktrace

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
