name: Build SmartVirtualization

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Получаем исходники напрямую из SmartVirtualization
      - name: Checkout SmartVirtualization
        uses: actions/checkout@v4
        with:
          repository: vpt0/SmartVirtualization
          ref: main

      # Устанавливаем JDK 17 (AGP требует >=17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Кэшируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Делаем gradlew исполняемым
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Собираем APK (обход ошибок lint/manifest)
      - name: Build APK
        run: ./gradlew assembleDebug -Pandroid.lint.abortOnError=false -Pandroid.injected.testOnly=true

      # Публикуем артефакты (APK из app/build/outputs/apk)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartvirtualization-apk
          path: app/build/outputs/apk/**/*.apk
          
