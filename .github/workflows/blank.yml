name: Build Makokolor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Получаем исходники напрямую из репозитория
      - name: Checkout Makokolor
        uses: actions/checkout@v4
        with:
          repository: rekluzlabs/Makokolor
          ref: main

      # Устанавливаем JDK 11 (как указано в build.gradle.kts)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Кэшируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Делаем gradlew исполняемым
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Сборка APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Публикация артефакта
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Makokolor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
