name: Build Wldroid Test App APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой на GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Критично! Скачивает все 17 субмодулей
          fetch-depth: 0

      - name: Set up Python (Required for Meson)
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.x'

      - name: Install Native Build Tools (Meson & Ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config
          pip install meson

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          # Проект требует NDK r28 согласно спецификации AGENTS.md
          ndk-version: '28.0.12433566' 

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Test App APK
        run: ./gradlew :testapp:assembleDebug --stacktrace
        env:
          # Если сборка нативных компонентов будет падать, можно временно отключить 
          # ненужные модули флагами, раскомментировав строку ниже:
          # GRADLE_OPTS: "-PskipShims" 

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wldroid-testapp-debug
          path: testapp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
