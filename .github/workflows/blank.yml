name: Debug buildXwaylandArm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            m4 \
            make \
            ninja-build \
            meson \
            pkg-config \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-mako \
            python3-jinja2 \
            python3-libxml2 \
            xsltproc \
            flex \
            bison \
            curl \
            git \
            patch \
            perl \
            gettext \
            gperf \
            xutils-dev \
            libxml2-utils

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -eux

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.13846066"

      - name: Detect NDK
        run: |
          set -eux

          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          export NDK=$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 | sort -V | tail -1)

          echo "Found NDK: $NDK"

          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"

          ls -la "$NDK"

      - name: Show environment
        run: |
          set -x

          env | sort

          which meson
          meson --version

          which ninja
          ninja --version

          which autoreconf
          autoreconf --version

          which libtoolize
          libtoolize --version

          which aclocal
          aclocal --version

          which pkg-config
          pkg-config --version

          which python3
          python3 --version

          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"

      - name: Run build-xwayland
        shell: bash
        continue-on-error: true
        run: |
          set -Eeuxo pipefail

          mkdir -p logs

          export PS4='+ ${BASH_SOURCE}:${LINENO}: '

          bash -x scripts/build-xwayland.sh \
            2>&1 | tee logs/build.log

      - name: Collect configure logs
        if: always()
        run: |
          set +e

          mkdir -p logs/configure

          find deps -name config.log -exec cp --parents {} logs/configure \;

          find build -name meson-log.txt -exec cp --parents {} logs/configure \;

      - name: Dump last logs
        if: always()
        run: |
          set +e

          echo "========== CONFIG.LOG =========="

          find deps -name config.log | while read f; do
            echo
            echo "##### $f #####"
            tail -200 "$f"
          done

          echo
          echo "========== MESON LOGS =========="

          find build -name meson-log.txt | while read f; do
            echo
            echo "##### $f #####"
            tail -200 "$f"
          done

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-debug
          if-no-files-found: warn
          path: |
            logs/**
            build/**
            deps/**/config.log
