name: Build Android App (Target Android 12)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем ОРИГИНАЛЬНЫЙ репозиторий вместо текущего
      - name: Clone Original Repository
        uses: actions/checkout@v4
        with:
          repository: 'ailoadtech/countit_app'
          ref: 'master' # Укажите ветку оригинального репозитория (обычно main или master)

      # Шаг 2: Устанавливаем Java (необходима для работы Android SDK и Gradle)
      # Для сборки под Android 12 обычно используется Java 11 или Java 17
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Популярный дистрибутив OpenJDK
          java-version: '17'
          cache: 'gradle'

      # Шаг 3: Устанавливаем Flutter SDK
      # Скрипт автоматически подтянет стабильную версию. При необходимости можно указать конкретную в `channel` или `version`.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Шаг 4: Принудительно проверяем и настраиваем Android SDK (Target 31/32 — это Android 12)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 31 # Android 12 (для 12L / 12.1 используется 32)
          build-tools: 31.0.0

      # Шаг 5: Получаем зависимости Flutter пакетов (pub get)
      - name: Install Dependencies
        run: flutter pub get

      # Шаг 6: Проверяем конфигурацию проекта (Необязательно, но полезно для логов)
      - name: Flutter Doctor
        run: flutter doctor -v

      # Шаг 7: Сборка APK. 
      # Мы собираем `--release`. Скрипт соберет универсальный APK (или App Bundle, если заменить apk на appbundle)
      - name: Build Android APK
        run: flutter build apk --release

      # Шаг 8: Загружаем готовый APK-файл в артефакты GitHub Actions, чтобы вы могли его скачать
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: countit-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7 # Файл будет храниться 7 дней
