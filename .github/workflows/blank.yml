name: Build Wldroid Test App APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Original Wldroid Repository
        uses: actions/checkout@v4
        with:
          repository: 'Shelnutt2/wldroid'
          ref: 'main'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up Python (Required for Meson)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Native Build Tools (Meson & Ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config wayland-protocols
          pip install meson

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r28
        run: |
          sdkmanager --install "ndk;28.0.12433566"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV

      # Создаем изолированную папку со свежими заголовками EGL от Khronos
      - name: Download Latest Khronos EGL Headers
        run: |
          mkdir -p .egl_fixed/EGL/
          mkdir -p .egl_fixed/KHR/
          curl -sSL -o ".egl_fixed/EGL/egl.h" https://registry.khronos.org/EGL/api/EGL/egl.h
          curl -sSL -o ".egl_fixed/EGL/eglext.h" https://registry.khronos.org/EGL/api/EGL/eglext.h
          curl -sSL -o ".egl_fixed/KHR/khrplatform.h" https://registry.khronos.org/EGL/api/KHR/khrplatform.h
          
          # Передаем путь к этой папке в приоритет компилятора (-I)
          # Также обманываем проверку wlroots, выставив самую актуальную дату релиза заголовков
          FIXED_INC_DIR="$GITHUB_WORKSPACE/.egl_fixed"
          echo "CFLAGS=-I$FIXED_INC_DIR -DEGL_EGLEXT_VERSION=20240000" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$FIXED_INC_DIR -DEGL_EGLEXT_VERSION=20240000" >> $GITHUB_ENV

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Test App APK
        run: ./gradlew :testapp:assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wldroid-testapp-debug
          path: testapp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
