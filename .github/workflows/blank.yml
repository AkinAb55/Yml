name: External Build WinDroidPro

on:
  workflow_dispatch:   # запуск вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WinDroidPro
        run: git clone https://github.com/esooLsIeicuJehT/WinDroidPro.git

      - name: Enter project directory
        run: cd WinDroidPro

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x WinDroidPro/gradlew

      - name: Build with Gradle
        run: cd WinDroidPro && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: WinDroidPro-debug-apk
          path: WinDroidPro/app/build/outputs/apk/debug/*.apk
          
