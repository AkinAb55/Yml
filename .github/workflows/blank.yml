name: Debug Xwayland Libffi (Force Fix)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK (27.2.12479018)
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            autoconf-archive \
            m4 \
            pkg-config \
            texinfo \
            gettext \
            git \
            curl \
            python3

      # Подготовка скриптов
      - name: Prepare Build Scripts & Verify Deps
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/ensure-deps.sh --verify-all

      # Включаем МАКСИМАЛЬНЫЙ ВЫВОД ЛОГОВ
      - name: Inject Max Verbose Flags into Script
        run: |
          sed -i '2i set -x' scripts/build-xwayland.sh
          sed -i 's/| tail -5//g' scripts/build-xwayland.sh
          sed -i 's/| tail -3//g' scripts/build-xwayland.sh
          sed -i 's/autoreconf -fi/autoreconf -fiv/g' scripts/build-xwayland.sh

      # Полная очистка перед тестом
      - name: Clear old libffi cache
        run: |
          rm -rf deps/xwayland-src/libffi
          rm -rf build/xwayland-aarch64/build-libffi || true

      # СОЗДАЕМ КРИТИЧЕСКИЙ ХАК ДЛЯ ACLOCAL
      - name: Force Libtool Macros Wrapper
        run: |
          # Создаем локальную директорию для бинарников и добавляем её в начало PATH
          mkdir -p $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          # Перехватываем вызовы aclocal и принудительно подмешиваем системные пути
          cat << 'EOF' > $HOME/.local/bin/aclocal
          #!/bin/bash
          exec /usr/bin/aclocal "$@" -I /usr/share/aclocal -I /usr/share/aclocal-1.16
          EOF
          chmod +x $HOME/.local/bin/aclocal

      # ТЕСТОВЫЙ ЗАПУСК
      - name: Debug single libffi build stage (Verbose)
        run: |
          ./scripts/build-xwayland.sh --only=libffi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          PKG_CONFIG_ALLOW_CROSS: "1"
