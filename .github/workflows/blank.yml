name: Build My Forked wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout My Forked Repository with Submodules
      uses: actions/checkout@v4
      with:
        # Теперь Actions автоматически скачает код ИМЕННО ВАШЕГО форка
        submodules: 'recursive' 

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK (Exact version required by project)
      run: |
        sdkmanager --install "ndk;28.0.13004108"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.13004108" >> $GITHUB_ENV
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/28.0.13004108" > local.properties

    - name: Patch JVM Target Compatibility in Build Files
      run: |
        echo "Патчим файлы build.gradle.kts, чтобы выровнять версии Java..."
        
        # Находим все файлы build.gradle.kts в проекте и заменяем JavaVersion.VERSION_21 на VERSION_17
        find . -name "build.gradle.kts" -type f -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +
        find . -name "build.gradle.kts" -type f -exec sed -i 's/compatibility = 21/compatibility = 17/g' {} +
        
        # На всякий случай проверяем и заменяем строковые упоминания jvmTarget = "21" на "17"
        find . -name "build.gradle.kts" -type f -exec sed -i 's/jvmTarget = "21"/jvmTarget = "17"/g' {} +

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        else
          echo "Критическая ошибка: gradlew не найден!"
          exit 1
        fi

    - name: Build Android APK via Gradle
      run: |
        # Запускаем чистую сборку без внешних init-скриптов
        ./gradlew assembleDebug --stacktrace

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
