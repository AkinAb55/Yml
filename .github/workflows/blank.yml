name: TAWC Wayland Diagnostic

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC
        uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          submodules: recursive

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config \
            libffi-dev libexpat1-dev \
            python3 curl

      - name: Build native wayland-scanner 1.25.0
        run: |
          curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz \
            | tar xz

          cd wayland-1.25.0

          meson setup build \
            --prefix=/usr/local \
            -Dlibraries=false \
            -Ddocumentation=false \
            -Dtests=false

          ninja -C build
          sudo ninja -C build install

      - name: Environment
        run: |
          echo "===== PATH ====="
          echo "$PATH"

          echo
          echo "===== WHICH ====="
          which wayland-scanner

          echo
          wayland-scanner --version

          echo
          echo "===== PKG CONFIG ====="
          pkg-config --modversion wayland-scanner

          echo
          pkg-config --variable=pcfiledir wayland-scanner

          echo
          echo "===== FILE ====="
          find /usr -name wayland-scanner.pc

      - name: Create Android cross file
        run: |
          mkdir -p build

          cat > build/android-cross.ini <<EOF
          [binaries]
          c='cc'
          cpp='c++'
          ar='ar'
          strip='strip'
          pkg-config='pkg-config'

          [host_machine]
          system='android'
          cpu_family='aarch64'
          cpu='aarch64'
          endian='little'
          EOF

      - name: Meson configure (same as TAWC)
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/share/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
        run: |
          echo "===== BEFORE ====="

          which wayland-scanner
          wayland-scanner --version

          pkg-config --modversion wayland-scanner

          echo
          echo "===== MESON ====="

          meson setup \
            build-wayland \
            deps/xwayland-src/wayland/src \
            --cross-file build/android-cross.ini \
            --prefix=/tmp/install \
            --buildtype=debug \
            -Ddefault_library=shared \
            -Dscanner=false \
            -Dtests=false \
            -Ddocumentation=false \
            -Ddtd_validation=false \
            -Dlibraries=true \
            --wipe

      - name: Dump Meson log
        if: always()
        run: |
          echo "===== MESON LOG ====="

          if [ -f build-wayland/meson-logs/meson-log.txt ]; then
              cat build-wayland/meson-logs/meson-log.txt
          else
              echo "meson-log.txt not found"
          fi
