name: Build SmartVirtualization

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Получаем исходники из твоего форка
      - name: Checkout SmartVirtualization
        uses: actions/checkout@v4

      # Устанавливаем JDK 17 (AGP требует >=17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Кэшируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Делаем gradlew исполняемым
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Собираем APK (lint не блокирует)
      - name: Build APK
        run: ./gradlew assembleDebug -Pandroid.lint.abortOnError=false

      # Запускаем lint отдельно, чтобы получить отчёт
      - name: Run Lint
        run: ./gradlew lintDebug -Pandroid.lint.abortOnError=false || true

      # Публикуем APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartvirtualization-apk
          path: app/build/outputs/apk/**/*.apk

      # Публикуем отчёт lint (HTML)
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          
