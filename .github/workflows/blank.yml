name: Test Native Scripts (Xwayland Fast-Track)

on:
  workflow_dispatch: # Запуск вручную в один клик из вкладки Actions

jobs:
  test-native-build:
    runs-on: ubuntu-24.04
    steps:
      # 1. Клонируем оригинальный репозиторий со всеми подмодулями
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      # 2. Настраиваем Android SDK и NDK (нужен для bionic-сборки Xwayland)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV

      # 3. Инструменты хоста (Добавлен libwayland-bin для сканера и python3-lxml для libxcb)
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build pkg-config patchelf \
            autoconf automake libtool libtool-bin bison flex gperf gettext texinfo \
            python3-pip python3-mako python3-lxml python3-setuptools \
            xsltproc wayland-protocols libwayland-bin curl perl git \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            
          sudo pip3 install --upgrade meson ninja --break-system-packages

      # 4. Настраиваем Rust (нужен для smithay и ffi-частей Mesa)
      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android, x86_64-linux-android, aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu'

      # 5. Права на исполнение и валидация зависимостей по deps.list
      - name: Sync and Verify Pinned Dependencies
        run: |
          find scripts/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      # 6. Патчинг скриптов: убираем tail + лечим изоляцию Meson для wayland-protocols
      - name: Patch scripts for verbose logs and Scanner bypass
        run: |
          # Убираем обрезку логов компиляции
          sed -i 's/| tail -5//g' scripts/build-xwayland.sh || true
          sed -i 's/| tail -3//g' scripts/build-xwayland.sh || true
          sed -i 's/| head -20//g' scripts/build-xwayland.sh || true
          
          # КРИТИЧЕСКИЙ ХАК ДЛЯ WAYLAND-PROTOCOLS:
          # Внедряем явное указание пути к бинарнику хоста во все вызовы 'meson setup' внутри build-xwayland.sh.
          # Это заставит Meson использовать /usr/bin/wayland-scanner из Ubuntu вместо бесконечного поиска в pkg-config.
          sed -i "s/meson setup \"\$build\" \"\$src\"/meson setup \"\$build\" \"\$src\" -Dwayland-scanner=\$(which wayland-scanner)/g" scripts/build-xwayland.sh
          
          echo "==> Проверка патча внутри build-xwayland.sh (строки вокруг meson setup):"
          grep -C 3 "meson setup" scripts/build-xwayland.sh

      # 7. ИЗОЛИРОВАННЫЙ ЗАПУСК СБОРКИ XWAYLAND
      - name: Execute Fast-Track Xwayland Build
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: |
          echo "==> Проверяем наличие сканера на хосте перед стартом:"
          which wayland-scanner
          
          echo "==> Запуск компиляции Xwayland под aarch64..."
          ./scripts/build-xwayland.sh --abi=aarch64

      # 8. Проверка артефактов на выходе
      - name: Check Build Artifacts
        run: |
          echo "==> Проверка структуры скомпилированных файлов:"
          if [ -d "build/xwayland-aarch64/install" ]; then
            ls -la build/xwayland-aarch64/install/bin/ || echo "Бинарники не найдены"
            ls -la build/xwayland-aarch64/install/lib/ || echo "Библиотеки не найдены"
          else
            echo "Папка install не создана. Сборка не завершилась."
            exit 1
          fi
