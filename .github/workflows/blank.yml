name: Clean TAWC Xwayland (Strict pkg-config isolation)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      WAYLAND_VERSION: "1.25.0"
      WAYLAND_PREFIX: "/tmp/wayland-host"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          ref: main
          submodules: recursive

      # ─────────────────────────────────────────────
      # 1. MINIMAL HOST TOOLCHAIN (NO libwayland-dev!)
      # ─────────────────────────────────────────────
      - name: Install build tools (no system Wayland)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git meson ninja-build \
            pkg-config autoconf automake libtool m4 \
            gettext curl python3 \
            libffi-dev libexpat1-dev \
            xsltproc xmlto

      # ─────────────────────────────────────────────
      # 2. BUILD WAYLAND 1.25 (ISOLATED PREFIX)
      # ─────────────────────────────────────────────
      - name: Build Wayland 1.25 host stack
        run: |
          set -e

          mkdir -p /tmp/wayland-src

          curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/${WAYLAND_VERSION}/wayland-${WAYLAND_VERSION}.tar.gz \
            | tar -xz -C /tmp/wayland-src --strip-components=1

          meson setup /tmp/wayland-src/build /tmp/wayland-src \
            -Dtests=false \
            -Ddocumentation=false \
            -Dlibraries=true \
            --prefix=${WAYLAND_PREFIX}

          ninja -C /tmp/wayland-src/build
          ninja -C /tmp/wayland-src/build install

      # ─────────────────────────────────────────────
      # 3. 🔥 STRICT PKG-CONFIG ISOLATION (KEY FIX)
      # ─────────────────────────────────────────────
      - name: Force strict pkg-config isolation
        run: |
          echo "PKG_CONFIG_LIBDIR=${WAYLAND_PREFIX}/lib/pkgconfig:${WAYLAND_PREFIX}/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${WAYLAND_PREFIX}/lib/pkgconfig:${WAYLAND_PREFIX}/share/pkgconfig" >> $GITHUB_ENV
          echo "PATH=${WAYLAND_PREFIX}/bin:$PATH" >> $GITHUB_ENV

      - name: Verify isolation (CRITICAL CHECK)
        run: |
          echo "=== which wayland-scanner ==="
          which wayland-scanner

          echo "=== version ==="
          wayland-scanner --version

          echo "=== pkg-config path dump ==="
          pkg-config --variable pc_path pkg-config || true

          echo "=== wayland-client ==="
          pkg-config --modversion wayland-client

          echo "=== wayland-server ==="
          pkg-config --modversion wayland-server

      # ─────────────────────────────────────────────
      # 4. BUILD XWAYLAND (FULL ISOLATION ENFORCED)
      # ─────────────────────────────────────────────
      - name: Build Xwayland (strict isolated stack)
        run: |
          set -e

          export WAYLAND_PREFIX="/tmp/wayland-host"

          # 🔥 HARD OVERRIDE (this is what was missing)
          export PKG_CONFIG_LIBDIR="${WAYLAND_PREFIX}/lib/pkgconfig:${WAYLAND_PREFIX}/lib/x86_64-linux-gnu/pkgconfig"
          export PKG_CONFIG_PATH="${WAYLAND_PREFIX}/lib/pkgconfig:${WAYLAND_PREFIX}/share/pkgconfig"

          # optional safety (ensures no accidental fallback)
          export PKG_CONFIG_SYSTEM_INCLUDE_PATH=""
          export PKG_CONFIG_SYSTEM_LIBRARY_PATH=""

          export PATH="${WAYLAND_PREFIX}/bin:$PATH"
          export ACLOCAL_PATH="${WAYLAND_PREFIX}/share/aclocal:/usr/share/aclocal"

          chmod +x scripts/build-xwayland.sh

          ./scripts/build-xwayland.sh --abi=aarch64

      # ─────────────────────────────────────────────
      # 5. FINAL LEAK TEST (MUST PASS)
      # ─────────────────────────────────────────────
      - name: Verify no system Wayland leak
        run: |
          echo "=== pc path ==="
          pkg-config --variable pc_path pkg-config

          echo "=== wayland-client flags ==="
          pkg-config --cflags wayland-client

          echo "=== wayland-server flags ==="
          pkg-config --cflags wayland-server

          echo "=== scanner ==="
          which wayland-scanner
          wayland-scanner --version
