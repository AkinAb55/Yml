name: Build Wldroid Test App APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Original Wldroid Repository
        uses: actions/checkout@v4
        with:
          repository: 'Shelnutt2/wldroid'
          ref: 'main'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up Python (Required for Meson)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Native Build Tools (Meson & Ninja)
        run: |
          sudo apt-get update
          # Устанавливаем системный кросс-компилятор для архитектуры ARM64
          sudo apt-get install -y ninja-build pkg-config wayland-protocols gcc-aarch64-linux-gnu
          pip install meson

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r28
        run: |
          sdkmanager --install "ndk;28.0.12433566"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV

      - name: Force Patch EGL version inside Android NDK
        run: |
          NDK_EGLEXT_FILE="${ANDROID_SDK_ROOT}/ndk/28.0.12433566/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/EGL/eglext.h"
          if [ -f "$NDK_EGLEXT_FILE" ]; then
            echo "Found NDK eglext.h. Patching EGL_EGLEXT_VERSION..."
            sudo sed -i 's/#define EGL_EGLEXT_VERSION .*/#define EGL_EGLEXT_VERSION 20240000/g' "$NDK_EGLEXT_FILE"
            echo "--- Verified modified line in NDK eglext.h ---"
            grep -n "EGL_EGLEXT_VERSION" "$NDK_EGLEXT_FILE"
          else
            echo "Error: NDK eglext.h not found at expected path!"
            exit 1
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Test App APK
        run: ./gradlew :testapp:assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wldroid-testapp-debug
          path: testapp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
