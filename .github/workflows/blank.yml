name: Debug Xwayland Libffi Stable Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC
        uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          ref: main
          submodules: recursive

      # ------------------------
      # TOOLCHAIN
      # ------------------------
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf automake libtool libtool-bin \
            m4 pkg-config \
            git curl perl \
            python3-pip python3-setuptools python3-mako \
            ninja-build \
            gettext \
            xsltproc \
            bison flex \
            texinfo \
            libssl-dev libarchive-tools \
            libdrm-dev libx11-dev libxcb1-dev libxkbcommon-dev libpixman-1-dev \
            libwayland-dev libepoxy-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # IMPORTANT: Meson fix (Mesa 25+ requires >=1.4)
      - name: Upgrade Meson
        run: |
          python3 -m pip install --upgrade meson ninja --break-system-packages
          meson --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      # ------------------------
      # CRITICAL FIX FOR AUTOTOOLS
      # ------------------------
      - name: Fix autotools environment (libtool/macros)
        run: |
          echo "ACLOCAL_PATH=/usr/share/aclocal:/usr/share/aclocal-1.16" >> $GITHUB_ENV
          echo "ACLOCAL_FLAGS=-I /usr/share/aclocal -I /usr/share/aclocal-1.16" >> $GITHUB_ENV
          echo "NOCONFIGURE=1" >> $GITHUB_ENV

      # ------------------------
      # DEPS
      # ------------------------
      - name: Prepare deps
        run: |
          chmod +x scripts/*.sh
          ./scripts/ensure-deps.sh --verify-all

      # ------------------------
      # IMPORTANT: CLEAN libffi state
      # ------------------------
      - name: Clean libffi build state
        run: |
          rm -rf deps/xwayland-src/libffi
          rm -rf build/xwayland-aarch64 || true

      # ------------------------
      # SINGLE CONTROLLED BUILD
      # ------------------------
      - name: Build libffi only (controlled)
        run: |
          set -e

          export PATH="$HOME/.local/bin:$PATH"
          export PKG_CONFIG_ALLOW_CROSS=1

          # IMPORTANT: do NOT patch build-xwayland.sh
          # we rely on upstream flow, only stabilize environment

          ./scripts/build-xwayland.sh --only=libffi
