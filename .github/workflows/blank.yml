name: Build TAWC (Full Monolithic Build)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    steps:
      # 1. Клонируем оригинальный репозиторий wmww/tawc без форка
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      # 2. Установка Java-окружения
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Установка Android SDK и точной версии NDK (27.2.12479018)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK (27.2.12479018)
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      # 4. Установка зависимостей хоста (Чистый x86_64)
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            python3-pip \
            python3-mako \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            patchelf \
            scdoc \
            bison \
            flex \
            gettext \
            texinfo \
            gperf \
            pkg-config \
            tar \
            zstd \
            m4 \
            xsltproc \
            glslang-tools \
            wayland-protocols \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libssl-dev \
            libwayland-dev \
            libegl-dev \
            libgles-dev \
            libdrm-dev \
            libvulkan-dev \
            libxkbcommon-dev \
            libpixman-1-dev \
            libepoxy-dev \
            libx11-dev \
            libxcb1-dev \
            libx11-xcb-dev

      # 5. Настройка Rust для сборки compositor
      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android, x86_64-linux-android'

      - name: Install cargo-ndk tool
        run: cargo install cargo-ndk

      # 6. Подготовка внутренних скриптов репозитория и проверка зависимостей
      - name: Prepare Build Scripts & Verify Deps
        run: |
          find scripts/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      # 7. Хак-логирование: убираем `tail -5`, чтобы видеть весь процесс компиляции
      - name: Patch script for verbose compilation log
        run: |
          sed -i 's/| tail -5//g' scripts/build-libhybris.sh
          sed -i 's/| tail -3//g' scripts/build-libhybris.sh

      # 8. Настройка кэширования Gradle
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 9. Финальная сборка полной монолитной версии приложения
      # Принудительно передаем CPPFLAGS, чтобы g++ заглядывал во вложенные папки заголовочных файлов EGL/Mesa
      - name: Compile Full Debug APK via Gradle
        run: |
          ./gradlew assembleDebug \
            -PtawcAbis=arm64-v8a,x86_64 \
            -PtawcMethods=tawcroot,proot,chroot \
            -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
            -PtawcXwayland=true \
            -PtawcAllFilesAccess=true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          RUSTFLAGS: "-A warnings"
          PKG_CONFIG_ALLOW_CROSS: "1"
          CPPFLAGS: "-I/usr/include/libdrm -I/usr/include/EGL -I/usr/include/GLES2 -I/usr/include/GLES3"

      # 10. Экспорт готового скомпилированного APK файла в артефакты GitHub
      - name: Upload Complete APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawc-ultimate-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
