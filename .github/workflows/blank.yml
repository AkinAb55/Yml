name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Clone WinDroidPro
      run: git clone https://github.com/esooLsIeicuJehT/WinDroidPro.git

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x WinDroidPro/gradlew

    - name: Build Debug APK
      run: cd WinDroidPro && ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Debug
        path: WinDroidPro/app/build/outputs/apk/debug/*.apk
        retention-days: 90
        
