name: Build es-dizyne APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout es-dizyne repo
        uses: actions/checkout@v4
        with:
          repository: emm-5/es-dizyne
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Download launcher icon
        run: |
          # Создаем структуру папок для Android-иконок
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # Скачиваем саму иконку в одну из папок плотности (xhdpi)
          curl -L "https://iconbird.com/png/download.php?id=23643&s=256" -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: es-dizyne-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
