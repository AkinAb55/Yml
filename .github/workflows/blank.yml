name: Build External wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Кнопка ручного запуска в интерфейсе Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout External Repository with Submodules
      uses: actions/checkout@v4
      with:
        # КРИТИЧЕСКИ ВАЖНО: Указываем репозиторий автора, который хотим собрать
        repository: 'Xtr126/wlroots-android-bridge'
        # Скачиваем ветку по умолчанию (main/master) со всеми вложенными зависимостями
        submodules: 'recursive' 

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK r28
      run: |
        sdkmanager --install "ndk;28.0.12433566"
        # Прописываем пути к NDK, чтобы CMake внутри чужого проекта знал, где компилятор
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" > local.properties

    - name: Grant execute permission for gradlew
      run: |
        # Теперь, когда код скачан правильно, gradlew точно будет на месте
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        else
          echo "Критическая ошибка: gradlew не найден даже после правильного checkout!"
          exit 1
        fi

    - name: Build Android APK via Gradle
      run: |
        # Запускаем сборку оригинального проекта
        ./gradlew assembleDebug --stacktrace

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
