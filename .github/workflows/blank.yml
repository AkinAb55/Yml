name: Build TAWC (Full Monolithic Build)

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      # 1. Клонируем оригинальный репозиторий
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      # 2. Установка Java-окружения
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Установка Android SDK и точной версии NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK (27.2.12479018)
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      # 4. Установка ВСЕХ зависимостей хоста (ДОБАВЛЕНЫ libtool, autoconf, automake)
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            python3-pip \
            autoconf \
            automake \
            libtool \
            scdoc \
            bison \
            flex \
            gettext \
            texinfo \
            gperf \
            pkg-config \
            tar \
            zstd \
            libssl-dev \
            glslang-tools \
            libxkbcommon-dev \
            libpixman-1-dev \
            libwayland-dev \
            wayland-protocols \
            m4 \
            xsltproc \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      # 5. Настройка Rust
      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android, x86_64-linux-android'
          
      - name: Install cargo-ndk tool
        run: cargo install cargo-ndk

      # 6. Подготовка скриптов
      - name: Prepare Build Scripts & Verify Deps
        run: |
          find scripts/ tawcroot/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      # 7. Настройка кэширования Gradle
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 8. Финальная сборка полной версии приложения
      - name: Compile Full Debug APK via Gradle
        run: |
          ./gradlew assembleDebug \
            -PtawcAbis=arm64-v8a,x86_64 \
            -PtawcMethods=tawcroot,proot,chroot \
            -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
            -PtawcXwayland=true \
            -PtawcAllFilesAccess=true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          RUSTFLAGS: "-A warnings"

      # 9. Экспорт готового файла
      - name: Upload Complete APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawc-ultimate-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
