name: Build TAWC — Arm64 Only

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"
  TAWC_ABIS: "arm64-v8a"
  WAYLAND_VERSION: "1.25.0"

jobs:
  build-arm64-apk:
    name: Build TAWC Arm64 APK
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          fetch-depth: 0

      - name: Install Host Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake ninja-build pkg-config \
            python3 python3-pip python3-venv python3-mako \
            autoconf automake libtool m4 gettext bison flex \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libffi-dev libvulkan-dev libarchive-tools \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            curl unzip patchelf rsync
          sudo pip3 install --break-system-packages --upgrade meson
        shell: bash

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}
          components: |
            platform-tools
            "platforms;android-${{ env.ANDROID_COMPILE_SDK }}"
            "build-tools;36.0.0"
            "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustup target add aarch64-linux-android aarch64-unknown-linux-gnu
          cargo install --locked cargo-ndk
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Pre-download Dependencies
        run: |
          chmod +x scripts/*.sh
          ./scripts/ensure-deps.sh --verify-all
        shell: bash

      - name: Build and Install Wayland 1.25 Scanner & Headers
        run: |
          set -e
          mkdir -p /tmp/wayland-src
          curl -L "https://gitlab.freedesktop.org/wayland/wayland/-/archive/\( {{ env.WAYLAND_VERSION }}/wayland- \){{ env.WAYLAND_VERSION }}.tar.gz" \
            | tar -xz -C /tmp/wayland-src --strip-components=1
          
          meson setup /tmp/wayland-src/build /tmp/wayland-src \
            -Dtests=false -Ddocumentation=false -Dlibraries=true \
            --prefix=/tmp/wayland-host
          ninja -C /tmp/wayland-src/build install
          
          sudo rm -f /usr/bin/wayland-scanner
          sudo cp /tmp/wayland-host/bin/wayland-scanner /usr/bin/wayland-scanner
          sudo chmod +x /usr/bin/wayland-scanner
          
          sudo mkdir -p /usr/local/share/pkgconfig
          sudo cp /tmp/wayland-host/lib/x86_64-linux-gnu/pkgconfig/wayland-scanner.pc /usr/local/share/pkgconfig/wayland-scanner.pc
          sudo sed -i 's|wayland_scanner=.*|wayland_scanner=/usr/bin/wayland-scanner|g' /usr/local/share/pkgconfig/wayland-scanner.pc
          
          mkdir -p deps/xwayland-src/wayland/egl
          cp /tmp/wayland-src/egl/wayland-egl-backend.h deps/xwayland-src/wayland/egl/
          
          echo "WAYLAND_SCANNER=/usr/bin/wayland-scanner" >> $GITHUB_ENV
          echo "HOST_WAYLAND_INC=/tmp/wayland-host/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/share/pkgconfig" >> $GITHUB_ENV
        shell: bash

      - name: libffi Hotfix
        run: |
          set -ex
          sed -i 's|e2eda0cf72a0598b44278cc91860ea402273fa29\tv3.5.2|f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf\tv3.6.0|g' deps/deps.list
          git -C deps/xwayland-src/libffi fetch origin f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf || true
          git -C deps/xwayland-src/libffi checkout f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf || true
          sed -i '/build_autotools libffi/i \  sed -i "s|LT_SYS_SYMBOL_USCORE|sys_symbol_underscore=no|g" deps/xwayland-src/libffi/configure.ac' scripts/build-xwayland.sh
        shell: bash

      - name: Build App
        run: |
          set -ex
          export ANDROID_NDK_HOME="\( {{ env.ANDROID_HOME }}/ndk/ \){{ env.ANDROID_NDK_VERSION }}"
          export C_INCLUDE_PATH="${{ env.HOST_WAYLAND_INC }}"
          export PKG_CONFIG_PATH="/usr/local/share/pkgconfig"
          
          ./scripts/build-app.sh --abi=arm64-v8a \
            --graphics=libhybris,libhybris-zink,gfxstream,cpu \
            --xwayland
        env:
          RUSTFLAGS: "-A warnings"
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tawc-arm64-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
