name: Build Android App (Target Android 12)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем ОРИГИНАЛЬНЫЙ репозиторий (Ветка ИСПРАВЛЕНА на main)
      - name: Clone Original Repository
        uses: actions/checkout@v4
        with:
          repository: 'ailoadtech/countit_app'
          ref: 'main' # Исправлено с master на main

      # Шаг 2: Устанавливаем Java 17 (оптимально для сборки под Android 12/Gradle 7+)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Шаг 3: Устанавливаем Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Шаг 4: Принудительно подтягиваем Android SDK API 31 (Android 12)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 31
          build-tools: 31.0.0

      # Шаг 5: Хак-скрипт для гарантированной сборки под Android 12.
      # Если в оригинальном репозитории targetSdkVersion ниже 31, этот шаг
      # автоматически перезапишет конфигурацию на Android 12 прямо перед сборкой.
      - name: Force Android 12 (API 31) Target
        run: |
          sed -i 's/compileSdkVersion.*/compileSdkVersion 31/g' android/app/build.gradle
          sed -i 's/targetSdkVersion.*/targetSdkVersion 31/g' android/app/build.gradle
          echo "Android SDK Target forced to API 31 (Android 12)"

      # Шаг 6: Получаем зависимости проекта
      - name: Install Dependencies
        run: flutter pub get

      # Шаг 7: Сборка универсального APK без подписи (Release Mode)
      - name: Build Android APK
        run: flutter build apk --release

      # Шаг 8: Загрузка готового APK в артефакты вашего GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: countit-app-android12-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
