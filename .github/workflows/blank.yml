name: Debug TAWC Xwayland Only
on:
  push:
    branches: [ main, master ]  # Автоматически при вашем коммите в YML-репо
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'          # Автоматически каждую ночь в 02:00 UTC
  workflow_dispatch:            # Ручная кнопка тоже остается на всякий случай

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"

jobs:
  test-xwayland-fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: recursive

      - name: Install Host Build Tools & Autotools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake meson ninja-build pkg-config \
            autoconf automake libtool libtool-bin m4 gettext bison flex \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu curl tar

      - name: Setup Android NDK via SDKManager
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          REAL_NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$REAL_NDK_PATH" ]; then REAL_NDK_PATH="$ANDROID_HOME/ndk-bundle"; fi
          echo "ANDROID_NDK_HOME=$REAL_NDK_PATH" >> $GITHUB_ENV

      - name: Fix Autotools Environment Globally
        run: |
          echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
          echo "ACLOCAL=aclocal -I /usr/share/aclocal" >> $GITHUB_ENV
          echo "VERBOSE=1" >> $GITHUB_ENV

      - name: Run TAWC Xwayland Build (Trace Mode)
        run: |
          find . -name "*.sh" -exec chmod +x {} + 2>/dev/null || true
          
          export ANDROID_NDK_HOME="${{ env.ANDROID_NDK_HOME }}"
          bash -x scripts/build-xwayland.sh --abi=aarch64
