name: Automated Windows Build WayLandIE
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    # 1. Клонируем сторонний репозиторий AstroCODEsky
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'AstroCODEsky/WayLandIE'
        ref: 'main'
        submodules: 'recursive'

    # 2. Настраиваем Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Настраиваем Android SDK и NDK (автоматически ставит актуальную версию r27)
    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    # 4. Адаптируем окружение SDK и исправляем точечный баг в заголовке NDK r27
    - name: Fix SDK Paths & Patch NDK Header Bug
      shell: pwsh
      run: |
        # 1. Исправляем пути SDK через Junction ссылки для версии 36.1.0
        $ActualBuildToolsDir = Get-ChildItem -Path "$env:ANDROID_HOME\build-tools" -Directory |
                                Sort-Object Name -Descending |
                                Select-Object -First 1
                
        $ActualPlatformDir = Get-ChildItem -Path "$env:ANDROID_HOME\platforms" -Directory |
                              Sort-Object Name -Descending |
                              Select-Object -First 1
        
        $FakeBuildToolsPath = Join-Path "$env:ANDROID_HOME\build-tools" "36.1.0"
        if (-not (Test-Path $FakeBuildToolsPath)) {
            New-Item -ItemType Junction -Path $FakeBuildToolsPath -Value $ActualBuildToolsDir.FullName
        }
        
        $FakePlatformPath = Join-Path "$env:ANDROID_HOME\platforms" "android-36"
        if (-not (Test-Path $FakePlatformPath)) {
            New-Item -ItemType Junction -Path $FakePlatformPath -Value $ActualPlatformDir.FullName
        }

        # 2. ТОЧЕЧНО ИСПРАВЛЯЕМ ОПЕЧАТКУ GOOGLE В NDK r27
        # Находим родной заголовок во всем дереве NDK
        $TargetHeader = Get-ChildItem -Path "$env:ANDROID_HOME\ndk" -Recurse -Filter "surface_control.h" | Select-Object -First 1
        
        if ($TargetHeader) {
            Write-Host "Найдено оригинальный заголовочный файл NDK по пути: $($TargetHeader.FullName)"
            
            # Читаем содержимое родного файла
            $Content = Get-Content $TargetHeader.FullName -Raw
            
            # Меняем ошибочную C++ ссылку 'const ARect& crop' на стандартный Си-указатель 'const ARect* crop'
            if ($Content -match 'const ARect& crop') {
                Write-Host "Обнаружен баг Google. Заменяем 'const ARect& crop' на 'const ARect* crop'..."
                $Content = $Content -replace 'const ARect& crop', 'const ARect* crop'
                Set-Content -Path $TargetHeader.FullName -Value $Content -Encoding UTF8
                Write-Host "Файл surface_control.h успешно исправлен!"
            } else {
                Write-Host "Баг в файле не обнаружен или уже исправлен."
            }
        } else {
            Write-Error "Не удалось найти файл surface_control.h для модификации!"
        }

    # 5. Запускаем оригинальный PowerShell скрипт автора
    - name: Build APK via Author's PowerShell Script
      shell: pwsh
      run: |
        cd android-app
        .\tools\build-apk.ps1 `
          -RequireNative `
          -NdkRoot "$env:ANDROID_NDK_ROOT" `
          -SdkRoot "$env:ANDROID_HOME"

    # 6. Собираем финальный бандл
    - name: Prepare Release Bundle
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .\release-dist\android-app
        New-Item -ItemType Directory -Force -Path .\release-dist\linux-runtime
        New-Item -ItemType Directory -Force -Path .\release-dist\scripts
                
        Copy-Item -Path .\android-app\out\waylandie-display-mvp.apk -Destination .\release-dist\android-app\
        Copy-Item -Recurse -Force -Path .\linux-runtime\* -Destination .\release-dist\linux-runtime\
        Copy-Item -Recurse -Force -Path .\scripts\* -Destination .\release-dist\scripts\
        if (Test-Path .\README.md) { Copy-Item -Path .\README.md -Destination .\release-dist\ }
                
        Write-Host "=== Содержимое бандла ==="
        Get-ChildItem -Path .\release-dist -Recurse

    # 7. Публикация готового архива
    - name: Upload Complete WayLandIE Bundle
      uses: actions/upload-artifact@v4
      with:
        name: WayLandIE-WindowsCompiled-Bundle
        path: .\release-dist\
