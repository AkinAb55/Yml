name: Build TAWC (ARM64 Only)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code (This Repository)
      uses: actions/checkout@v4

    - name: Clone Original TAWC Repository
      run: |
        rm -rf .git
        git init
        git remote add origin https://github.com/wmww/tawc.git
        git pull origin main
        git submodule update --init --recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        build-tools: 36.0.0

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.2.12479018"
        # Экспортируем переменную в глобальный GITHUB_ENV для всех шагов
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

    - name: Install Host Dependencies & ARM64 Cross-Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          meson \
          ninja-build \
          pkg-config \
          libwayland-dev \
          libxkbcommon-dev \
          bison \
          flex \
          git-lfs \
          libtool \
          libtool-bin \
          autoconf \
          automake \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          libvulkan-dev \
          patchelf \
          file

    - name: Un-hide build logs (Remove tail from script)
      run: |
        sed -i 's/2>\&1 | tail -5//g' scripts/build-libhybris.sh || true
        sed -i 's/2>\&1 | tail -20//g' scripts/build-libhybris.sh || true
        sed -i 's/2>\&1 | tail -3//g' scripts/build-libhybris.sh || true

    - name: Set up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android

    - name: Install cargo-ndk
      run: |
        cargo install cargo-ndk
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Grant Execute Permissions to Scripts
      run: |
        chmod +x gradlew
        find scripts/ -type f -name "*.sh" -exec chmod +x {} +

    - name: Pre-build & Fetch Dependencies
      run: |
        ./scripts/ensure-deps.sh smithay
        ./scripts/ensure-deps.sh libxkbcommon
        ./scripts/ensure-deps.sh libhybris
        ./scripts/ensure-deps.sh --patches rutabaga_gfx deps/rutabaga-patches/rutabaga_gfx || true

    - name: Build Full Debug APK (ARM64)
      env:
        # ПРАВКА: Заставляем Gradle жестко видеть NDK через local.properties и переменные окружения Linux
        # Использование $ANDROID_NDK_HOME здесь безопасно, так как мы берем его из ОС, а не из контекста ${{ env }}
        PATH: /usr/bin:/bin:${{ env.PATH }}
        CC_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        AR_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
      run: |
        echo "ndk.dir=${ANDROID_NDK_HOME}" > local.properties
        ./gradlew assembleDebug --stacktrace --console=plain \
          -PtawcAbis=arm64-v8a \
          -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
          -PtawcXwayland=true \
          -PtawcAllFilesAccess=true

    - name: Build Full Release APK (ARM64)
      env:
        PATH: /usr/bin:/bin:${{ env.PATH }}
        CC_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        AR_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
      run: |
        echo "ndk.dir=${ANDROID_NDK_HOME}" > local.properties
        ./gradlew assembleRelease --stacktrace --console=plain \
          -PtawcMethods=tawcroot,proot,chroot \
          -PtawcAbis=arm64-v8a \
          -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
          -PtawcXwayland=true \
          -PtawcAllFilesAccess=true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: tawc-debug-arm64
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: tawc-release-arm64
        path: app/build/outputs/apk/release/*.apk
