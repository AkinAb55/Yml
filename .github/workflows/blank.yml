name: Build Android APK (External)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонируем СТОРОННИЙ репозиторий напрямую в корневую директорию воркфлоу
      - name: Checkout external code
        uses: actions/checkout@v4
        with:
          repository: 'whesley264-oss/offline-camera-translator'
          ref: 'main' # Укажите ветку, если она отличается от main

      # 2. Настраиваем Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Создаем конфигурационный файл для Android SDK
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # 4. Собираем отладочный APK
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache

      # 5. Выгружаем готовый APK в артефакты
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 6. Если сборка упала — сохраняем логи для разбора полетов
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            app/build/reports/
          retention-days: 7
