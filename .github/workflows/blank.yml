name: Test Native Scripts (Xwayland Fast-Track)

on:
  workflow_dispatch: # Запуск вручную в один клик для тестов

jobs:
  test-native-build:
    runs-on: ubuntu-24.04
    steps:
      # 1. Клонируем репозиторий со всеми вложенными модулями
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      # 2. Ставим Android SDK и NDK (нужен строго для bionic-сборки Xwayland)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Устанавливаем NDK, который требует проект
      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV

      # 3. Минимальный набор инструментов хоста для компиляции C/C++ и кодогенерации
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build pkg-config patchelf \
            autoconf automake libtool libtool-bin bison flex gperf gettext texinfo \
            python3-pip python3-mako python3-lxml python3-setuptools \
            xsltproc wayland-protocols curl perl git \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu # Для Mesa/Hybris glibc частей
            
          sudo pip3 install --upgrade meson ninja --break-system-packages

      # 4. Накатываем Rust (необходим для smithay и ffi-частей Mesa)
      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android, x86_64-linux-android, aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu'

      # 5. Права на исполнение скриптов и скачивание/валидация апстрим-зависимостей
      - name: Sync and Verify Pinned Dependencies
        run: |
          find scripts/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      # 6. ТЕСТОВЫЙ ЗАПУСК СБОРКИ НАПРЯМУЮ (БЕЗ GRADLE)
      # Запускаем сборку Xwayland для архитектуры aarch64.
      # Вы можете добавить сюда и другие скрипты, например: ./scripts/build-mesa-gfxstream.sh
      - name: Execute Fast-Track Xwayland Build
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: |
          echo "==> Starting isolated Xwayland compilation..."
          ./scripts/build-xwayland.sh --abi=aarch64

      # 7. Проверяем, что бинарник и библиотеки успешно создались в папке префикса
      - name: Check Build Artifacts
        run: |
          echo "==> Validating generated artifacts structure:"
          ls -la build/xwayland-aarch64/install/bin/
          ls -la build/xwayland-aarch64/install/lib/
