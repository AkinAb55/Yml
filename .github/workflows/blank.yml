name: Build TAWC (ARM64 Only)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (This Repository)
      uses: actions/checkout@v4

    - name: Clone Original TAWC Repository
      run: |
        # Очищаем лишнее и стягиваем оригинальный репозиторий
        rm -rf .git
        git init
        git remote add origin https://github.com/wmww/tawc.git
        git pull origin main
        git submodule update --init --recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        build-tools: 36.0.0

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.2.12479018"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

    - name: Install Host Dependencies & ARM64 Cross-Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          meson \
          ninja-build \
          pkg-config \
          libwayland-dev \
          libxkbcommon-dev \
          bison \
          flex \
          git-lfs \
          libtool \
          libtool-bin \
          autoconf \
          automake \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu

    - name: Link Host Libtool for NDK Cross-Compilation
      run: |
        # Создаем симлинки, чтобы autotools внутри libhybris находил libtool по префиксу NDK
        sudo ln -s /usr/bin/libtool /usr/bin/aarch64-linux-android-libtool
        sudo ln -s /usr/bin/libtoolize /usr/bin/aarch64-linux-android-libtoolize
        sudo ln -s /usr/bin/libtool /usr/bin/aarch64-linux-gnu-libtool
        sudo ln -s /usr/bin/libtoolize /usr/bin/aarch64-linux-gnu-libtoolize

    - name: Set up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android

    - name: Install cargo-ndk
      run: |
        cargo install cargo-ndk
        # Прописываем путь к бинарникам cargo в глобальный PATH для следующих шагов
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Grant Execute Permissions to Scripts
      run: |
        chmod +x gradlew
        find scripts/ -type f -name "*.sh" -exec chmod +x {} +

    - name: Pre-build & Fetch Dependencies
      run: |
        # Выкачиваем и подготавливаем все зависимости до запуска основного Gradle
        ./scripts/ensure-deps.sh smithay
        ./scripts/ensure-deps.sh libxkbcommon
        ./scripts/ensure-deps.sh libhybris
        ./scripts/ensure-deps.sh --patches rutabaga_gfx deps/rutabaga-patches/rutabaga_gfx || true

    - name: Build Full Debug APK (ARM64)
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        PATH: /usr/bin:/bin:${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin:${{ env.PATH }}
        LIBTOOL: /usr/bin/libtool
        LIBTOOLIZE: /usr/bin/libtoolize
        # Пробрасываем корректные компиляторы NDK 27 для сборщика Rust (Cargo) под API 29
        CC_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        AR_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
      run: |
        # Флаги --info и --stacktrace заставят Gradle показать лог падения самого Cargo
        ./gradlew assembleDebug --info --stacktrace \
          -PtawcAbis=arm64-v8a \
          -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
          -PtawcXwayland=true \
          -PtawcAllFilesAccess=true

    - name: Build Full Release APK (ARM64)
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        PATH: /usr/bin:/bin:${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin:${{ env.PATH }}
        LIBTOOL: /usr/bin/libtool
        LIBTOOLIZE: /usr/bin/libtoolize
        # Пробрасываем корректные компиляторы NDK 27 для сборщика Rust (Cargo) под API 29
        CC_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        AR_aarch64_linux_android: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
      run: |
        ./gradlew assembleRelease --info --stacktrace \
          -PtawcMethods=tawcroot,proot,chroot \
          -PtawcAbis=arm64-v8a \
          -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
          -PtawcXwayland=true \
          -PtawcAllFilesAccess=true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: tawc-debug-arm64
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: tawc-release-arm64
        path: app/build/outputs/apk/release/*.apk
