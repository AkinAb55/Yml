name: Debug Xwayland Build (Stable CI Fix)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          ref: main
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      # =========================
      # TOOLCHAIN FIX LAYER
      # =========================
      - name: Install host dependencies (FIXED TOOLCHAIN)
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            git curl \
            pkg-config \
            m4 \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            gettext \
            texinfo \
            bison flex \
            python3-pip python3-setuptools python3-wheel \
            ninja-build

          # IMPORTANT: DO NOT use apt meson (too old for Mesa 25.x)

          python3 -m pip install --upgrade --break-system-packages \
            meson>=1.4.0 \
            ninja

          # ensure user pip bin is used
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # verify toolchain
          which meson
          meson --version
          autoconf --version
          libtoolize --version

      # =========================
      # DEPS
      # =========================
      - name: Prepare deps
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/ensure-deps.sh --verify-all

      # =========================
      # CRITICAL AUTOTOOLS FIX
      # =========================
      - name: Fix autotools environment (NO repo edits)
        run: |
          export ACLOCAL_PATH=/usr/share/aclocal:/usr/share/aclocal-1.16
          export ACLOCAL_FLAGS="-I /usr/share/aclocal -I /usr/share/aclocal-1.16"

          # force correct libtool macros visibility
          export LIBTOOLIZE=libtoolize

      # =========================
      # CLEAN STATE
      # =========================
      - name: Clean libffi & build cache
        run: |
          rm -rf deps/xwayland-src/libffi
          rm -rf build/xwayland-aarch64 || true

      # =========================
      # BUILD
      # =========================
      - name: Build libffi only (debug stage)
        run: |
          set -e

          export ACLOCAL_PATH=/usr/share/aclocal:/usr/share/aclocal-1.16
          export ACLOCAL_FLAGS="-I /usr/share/aclocal -I /usr/share/aclocal-1.16"

          export PATH="$HOME/.local/bin:$PATH"

          ./scripts/build-xwayland.sh --only=libffi
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
