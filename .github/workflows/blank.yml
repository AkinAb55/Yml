name: Build Android App

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в Actions
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем оригинальный репозиторий
      - name: Clone Original Repository
        uses: actions/checkout@v4
        with:
          repository: 'ailoadtech/countit_app'
          ref: 'main'

      # 2. Устанавливаем JDK 17 (наиболее стабильная версия для современных Gradle-скриптов *.gradle.kts)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Даем права на выполнение встроенному сборщику Gradle (gradlew)
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. Собираем проект в режиме Release с помощью Gradle
      # Скрипт автоматически скачает нужную версию Android SDK, OpenCV и TFLite зависимости
      - name: Build with Gradle
        run: ./gradlew assembleRelease

      # 5. Сохраняем готовый APK-файл в артефакты GitHub Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: countit-app-release-apk
          # Путь к файлу согласно стандартной структуре Gradle: app/build/outputs/apk/release/
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
