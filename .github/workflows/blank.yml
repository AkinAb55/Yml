name: Build TAWC — Full Monolithic Build with Xwayland Patches

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"
  TAWC_ABIS: "arm64-v8a,x86_64"
  TIMEOUT_MINUTES_HEAVY: 360
  WAYLAND_VERSION: "1.25.0"
  WAYLAND_PREFIX: "/tmp/wayland-host"

jobs:
  prepare-deps:
    name: Prepare, patch & verify vendored deps
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      deps-key: ${{ steps.cache-deps.outputs.cache-hit }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          fetch-depth: 0
          submodules: recursive

      - name: Install small tooling for ensure-deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends git curl tar
        shell: bash

      - name: Ensure vendored deps (clone + verify)
        run: |
          set -ex
          chmod +x scripts/ensure-deps.sh
          # Скачиваем базовые зависимости, включая требуемые для фикса Xwayland
          ./scripts/ensure-deps.sh termux-app wayland libffi xwayland pixman libdrm xkeyboard-config
          ./scripts/ensure-deps.sh libhybris smithay mesa rutabaga_gfx gfxstream || true
          ./scripts/ensure-deps.sh --verify-all || true
        shell: bash

      # ─── ИНТЕГРАЦИЯ ХОТФИКСА LIBFFI ИЗ ВТОРОГО СКРИПТА ───
      - name: Upgrade libffi and Hotfix build script
        run: |
          set -ex
          # Синхронизируем манифест и git-версию libffi до v3.6.0
          sed -i 's|e2eda0cf72a0598b44278cc91860ea402273fa29\tv3.5.2|f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf\tv3.6.0|g' deps/deps.list
          git -C deps/xwayland-src/libffi fetch origin f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf
          git -C deps/xwayland-src/libffi checkout f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf
          
          # Устраняем ошибку LT_SYS_SYMBOL_USCORE в libffi перед вызовом build_autotools
          sed -i '/build_autotools libffi/i \  sed -i "s|LT_SYS_SYMBOL_USCORE|sys_symbol_underscore=no|g" deps/xwayland-src/libffi/configure.ac' scripts/build-xwayland.sh
        shell: bash

      - name: Cache deps directory (quick restore between runs)
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: deps
          key: deps-list-${{ hashFiles('deps/deps.list') }}-v2
          restore-keys: deps-list-

      - name: Upload deps checkout as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawc-deps
          path: deps
          if-no-files-found: error

  native-build:
    name: Native cross-builds — libhybris, Mesa, Xwayland, proot, tawcroot
    runs-on: ubuntu-24.04
    needs: prepare-deps
    timeout-minutes: ${{ env.TIMEOUT_MINUTES_HEAVY }}
    steps:
      - name: Checkout repo (shallow from workflow workspace)
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          fetch-depth: 0
          submodules: recursive

      - name: Download vendored deps artifact
        uses: actions/download-artifact@v4
        with:
          name: tawc-deps
          path: deps

      - name: Install host packages (heavy native build prerequisites)
        run: |
          set -ex
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake meson ninja-build pkg-config \
            python3 python3-pip python3-setuptools python3-distutils \
            autoconf automake libtool libtool-bin libxml2-utils xsltproc m4 \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxcb1-dev libxcb-xkb-dev libx11-xcb-dev \
            libffi-dev libegl1-mesa-dev libgles-dev libdrm-dev libepoxy-dev \
            curl unzip bc patchelf gettext bison flex texinfo gperf tar libexpat1-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-x86-64-linux-gnu g++-x86-64-linux-gnu pkgconf
          sudo pip3 install --upgrade meson ninja --break-system-packages || true
        shell: bash

      - name: Setup Android NDK via SDKManager
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          REAL_NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$REAL_NDK_PATH" ]; then REAL_NDK_PATH="$ANDROID_HOME/ndk-bundle"; fi
          echo "ANDROID_NDK_HOME=$REAL_NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      # ─── ИНТЕГРАЦИЯ СБОРКИ WAYLAND 1.25 ДЛЯ СИСТЕМНОГО PKG-CONFIG ───
      - name: Build and System-Register Wayland 1.25 Host Stack
        run: |
          set -e
          mkdir -p /tmp/wayland-src
          curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/${{ env.WAYLAND_VERSION }}/wayland-${{ env.WAYLAND_VERSION }}.tar.gz \
            | tar -xz -C /tmp/wayland-src --strip-components=1
          
          meson setup /tmp/wayland-src/build /tmp/wayland-src \
            -Dtests=false \
            -Ddocumentation=false \
            -Dlibraries=true \
            --prefix=${{ env.WAYLAND_PREFIX }}
          
          ninja -C /tmp/wayland-src/build
          ninja -C /tmp/wayland-src/build install
          
          # Экспорт .pc файлов в общую систему для pkg-config
          sudo cp ${{ env.WAYLAND_PREFIX }}/lib/x86_64-linux-gnu/pkgconfig/*.pc /usr/share/pkgconfig/
          
          # Замена системного сканера на собранный Wayland-scanner 1.25
          sudo rm -f /usr/bin/wayland-scanner
          sudo cp ${{ env.WAYLAND_PREFIX }}/bin/wayland-scanner /usr/bin/wayland-scanner
          sudo chmod +x /usr/bin/wayland-scanner
          
          echo "=== Проверка системной регистрации ==="
          pkg-config --modversion wayland-scanner
          wayland-scanner --version
          
          # Экспорт путей в окружение шагов
          echo "PATH=${{ env.WAYLAND_PREFIX }}/bin:${PATH}" >> $GITHUB_PATH
          echo "ACLOCAL_PATH=${{ env.WAYLAND_PREFIX }}/share/aclocal:/usr/share/aclocal" >> $GITHUB_ENV
          echo "WAYLAND_SCANNER=/usr/bin/wayland-scanner" >> $GITHUB_ENV
        shell: bash

      - name: Build libhybris (glibc aarch64 cross) and pack asset
        run: |
          set -ex
          find . -name "*.sh" -exec chmod +x {} + 2>/dev/null || true
          ./scripts/build-libhybris.sh --clean
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Build libxkbcommon for ABIs
        run: |
          set -ex
          ./scripts/build-libxkbcommon.sh --abi=aarch64 || true
          ./scripts/build-libxkbcommon.sh --abi=x86_64 || true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Build proot & tawcroot native libraries
        run: |
          set -ex
          ./scripts/build-proot.sh --abi=aarch64 || true
          ./scripts/build-proot.sh --abi=x86_64 || true
          tawcroot/build.sh --abi=aarch64 || true
          tawcroot/build.sh --abi=x86_64 || true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Build gfxstream backend (if present)
        run: |
          set -ex
          if [ -f scripts/build-gfxstream-backend.sh ]; then
            ./scripts/build-gfxstream-backend.sh --abi=aarch64 || true
            ./scripts/build-gfxstream-backend.sh --abi=x86_64 || true
          else
            echo "skip: no gfxstream backend build script"
          fi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Build Mesa gfxstream / Mesa-Zink (long)
        run: |
          set -ex
          if [ -f scripts/build-mesa-gfxstream.sh ]; then
            bash -x scripts/build-mesa-gfxstream.sh --abi=aarch64 || true
            bash -x scripts/build-mesa-gfxstream.sh --abi=x86_64 || true
          else
            echo "skip: no scripts/build-mesa-gfxstream.sh"
          fi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Build Xwayland (bionic) and stage
        run: |
          set -ex
          export VERBOSE=1
          bash -x scripts/build-xwayland.sh --abi=aarch64 || true
          bash -x scripts/build-xwayland.sh --abi=x86_64 || true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Package native assets (jniLibs + assets)
        run: |
          set -ex
          mkdir -p native-assets
          cp -a app/src/main/jniLibs native-assets/ || true
          cp -a app/src/main/assets native-assets/ || true
          if [ -d build/xwayland-aarch64/install ]; then
            cp -a build/xwayland-aarch64/install native-assets/xwayland-aarch64-install || true
          fi
          if [ -d build/xwayland-x86_64/install ]; then
            cp -a build/xwayland-x86_64/install native-assets/xwayland-x86_64-install || true
          fi
        shell: bash

      - name: Upload native-assets artifact
        uses: actions/artifact@v4
        with:
          name: tawc-native-assets
          path: native-assets
          if-no-files-found: warn

  compositor-build:
    name: Build Rust compositor (libcompositor.so per ABI)
    runs-on: ubuntu-24.04
    needs: native-build
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          fetch-depth: 0
          submodules: recursive

      - name: Download deps artifact (for smithay, rutabaga patches)
        uses: actions/download-artifact@v4
        with:
          name: tawc-deps
          path: deps

      - name: Download native-assets (so we can stage libs later)
        uses: actions/download-artifact@v4
        with:
          name: tawc-native-assets
          path: native-assets

      - name: Setup Rust + cargo-ndk
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install --locked cargo-ndk || true
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Ensure Android NDK env
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          REAL_NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$REAL_NDK_PATH" ]; then REAL_NDK_PATH="$ANDROID_HOME/ndk-bundle"; fi
          echo "ANDROID_NDK_HOME=$REAL_NDK_PATH" >> $GITHUB_ENV
        shell: bash

      - name: Build compositor for ABIs
        run: |
          set -ex
          source $HOME/.cargo/env || true
          # build for arm64
          cargo ndk --target aarch64-linux-android --platform 29 --release build --manifest-path=compositor/Cargo.toml || true
          # build for x86_64
          cargo ndk --target x86_64-linux-android --platform 29 --release build --manifest-path=compositor/Cargo.toml || true
          
          mkdir -p app/src/main/jniLibs/arm64-v8a app/src/main/jniLibs/x86_64
          cp -a compositor/target/aarch64-linux-android/release/libcompositor.so app/src/main/jniLibs/arm64-v8a/ || true
          cp -a compositor/target/x86_64-linux-android/release/libcompositor.so app/src/main/jniLibs/x86_64/ || true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: Upload compositor libs (staged jniLibs)
        uses: actions/upload-artifact@v4
        with:
          name: tawc-compositor-libs
          path: app/src/main/jniLibs
          if-no-files-found: warn

  assemble-apk:
    name: Assemble APK (Gradle) — consumes native assets + compositor libs
    runs-on: ubuntu-24.04
    needs: [native-build, compositor-build]
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          fetch-depth: 0
          submodules: recursive

      - name: Download native-assets
        uses: actions/download-artifact@v4
        with:
          name: tawc-native-assets
          path: native-assets

      - name: Download compositor libs (jniLibs)
        uses: actions/download-artifact@v4
        with:
          name: tawc-compositor-libs
          path: app/src/main/jniLibs

      - name: Copy native assets into app tree
        run: |
          set -ex
          if [ -d native-assets/jniLibs ]; then
            rsync -a native-assets/jniLibs/ app/src/main/jniLibs/ || true
          fi
          if [ -d native-assets/assets ]; then
            rsync -a native-assets/assets/ app/src/main/assets/ || true
          fi
          if [ -f native-assets/xwayland-aarch64-install/share.tar ]; then
            mkdir -p app/src/main/assets/xwayland
            cp native-assets/xwayland-aarch64-install/share.tar app/src/main/assets/xwayland/share.tar
          fi
        shell: bash

      - name: Install JDK and Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK & NDK (for Gradle)
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          REAL_NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$REAL_NDK_PATH" ]; then REAL_NDK_PATH="$ANDROID_HOME/ndk-bundle"; fi
          echo "ANDROID_NDK_HOME=$REAL_NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Gradle assembleDebug (full monolithic)
        run: |
          set -ex
          ./gradlew assembleDebug \
            -PtawcAbis=${{ env.TAWC_ABIS }} \
            -PtawcMethods=tawcroot,proot,chroot \
            -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
            -PtawcXwayland=true \
            -PtawcAllFilesAccess=true \
            --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          RUSTFLAGS: "-A warnings"
          PKG_CONFIG_ALLOW_CROSS: "1"
        shell: bash

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawc-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload full artifacts (jniLibs / assets) for debugging
        uses: actions/upload-artifact@v4
        with:
          name: tawc-final-assets
          path: |
            app/src/main/jniLibs
            app/src/main/assets
          if-no-files-found: warn
