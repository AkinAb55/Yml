name: Build Wldroid Test App APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Original Wldroid Repository
        uses: actions/checkout@v4
        with:
          repository: 'Shelnutt2/wldroid'
          ref: 'main'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up Python (Required for Meson)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Native Build Tools (Meson & Ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config wayland-protocols
          pip install meson

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r28
        run: |
          sdkmanager --install "ndk;28.0.12433566"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV

      - name: Fix Android NDK EGL Headers
        run: |
          # Путь к заголовочным файлам Khronos внутри установленного NDK
          NDK_EGL_DIR="${ANDROID_SDK_ROOT}/ndk/28.0.12433566/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/EGL"
          
          # Скачиваем самые свежие заголовочные файлы напрямую от Khronos Group
          echo "Updating EGL headers in NDK..."
          curl -sSL -o "${NDK_EGL_DIR}/egl.h" https://registry.khronos.org/EGL/api/EGL/egl.h
          curl -sSL -o "${NDK_EGL_DIR}/eglext.h" https://registry.khronos.org/EGL/api/EGL/eglext.h

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Test App APK
        run: ./gradlew :testapp:assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wldroid-testapp-debug
          path: testapp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
