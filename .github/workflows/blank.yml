name: Test Host Wayland 1.25

on:
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC
        uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          ref: main
          submodules: recursive

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            curl \
            autoconf \
            automake \
            libtool \
            gettext \
            bison \
            flex \
            libxml2-utils \
            xsltproc

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk: ${{ env.ANDROID_NDK_VERSION }}

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      #####################################################
      # BUILD HOST WAYLAND 1.25
      #####################################################

      - name: Build host Wayland 1.25
        run: |

          set -ex

          PREFIX=$HOME/wayland-host

          git clone \
            --depth=1 \
            --branch 1.25.0 \
            https://gitlab.freedesktop.org/wayland/wayland.git \
            /tmp/wayland

          meson setup \
            /tmp/wayland/build \
            /tmp/wayland \
            --prefix=$PREFIX \
            -Ddocumentation=false \
            -Dtests=false

          ninja -C /tmp/wayland/build

          ninja -C /tmp/wayland/build install

          echo "$PREFIX/bin" >> $GITHUB_PATH

          echo "PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig:$PREFIX/share/pkgconfig" >> $GITHUB_ENV

      #####################################################
      # VERIFY
      #####################################################

      - name: Verify host Wayland
        run: |

          export PATH="$HOME/wayland-host/bin:$PATH"
          export PKG_CONFIG_PATH="$HOME/wayland-host/lib/pkgconfig:$HOME/wayland-host/share/pkgconfig"

          echo "==== which ===="
          which wayland-scanner

          echo "==== version ===="
          wayland-scanner --version

          echo "==== pkg-config ===="
          pkg-config --modversion wayland-scanner

          echo "==== pc file ===="
          pkg-config --variable pcfiledir wayland-scanner

      #####################################################
      # ORIGINAL SCRIPT
      #####################################################

      - name: Ensure deps
        run: |
          chmod +x scripts/*.sh
          ./scripts/ensure-deps.sh --verify-all

      - name: Run original build-xwayland.sh
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |

          export PATH="$HOME/wayland-host/bin:$PATH"
          export PKG_CONFIG_PATH="$HOME/wayland-host/lib/pkgconfig:$HOME/wayland-host/share/pkgconfig"

          bash -x scripts/build-xwayland.sh --abi=aarch64
