name: Build External wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout External Repository with Submodules
      uses: actions/checkout@v4
      with:
        repository: 'Xtr126/wlroots-android-bridge'
        submodules: 'recursive' 

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK (Exact version required by project)
      run: |
        # Устанавливаем именно ту версию NDK, которую запросил Gradle: 28.0.13004108
        sdkmanager --install "ndk;28.0.13004108"
        
        # Обновляем пути к правильной папке NDK
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.13004108" >> $GITHUB_ENV
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/28.0.13004108" > local.properties

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        else
          echo "Критическая ошибка: gradlew не найден!"
          exit 1
        fi

    - name: Build Android APK via Gradle
      run: |
        ./gradlew assembleDebug --stacktrace

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
