name: Build ShadowCore

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Получаем исходники напрямую из ShadowCore
      - name: Checkout ShadowCore
        uses: actions/checkout@v4
        with:
          repository: ReturnKartikey/ShadowCore
          ref: main

      # Устанавливаем JDK 11 (как указано в build.gradle.kts)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Кэшируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Запускаем сборку
      - name: Build with Gradle
        run: ./gradlew build

      # Публикуем артефакты (например, jar из build/libs)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shadowcore-artifacts
          path: build/libs/*.jar
          
