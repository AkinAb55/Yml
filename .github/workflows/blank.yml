name: Build Xwayland Complete Monolith
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build autoconf automake libtool libtool-bin \
            autoconf-archive m4 pkg-config texinfo gettext git curl python3 \
            libffi-dev libexpat1-dev xmlto

      - name: Compile Native Wayland Scanner (v1.25.0)
        run: |
          mkdir -p /tmp/wayland-native
          curl -fsSL https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz | tar -xz -C /tmp/wayland-native --strip-components=1
          cd /tmp/wayland-native
          meson setup build --prefix=/usr/local -Ddocumentation=false -Dtests=false -Dlibraries=false
          ninja -C build
          sudo ninja -C build install
          wayland-scanner --version

      - name: Prepare Build Scripts & Deps
        run: |
          find scripts/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      - name: Overwrite build_autotools with Ironclad Version
        run: |
          # Используем Python для гарантированной замены всей функции целиком без проблем с экранированием bash
          python3 -c '
          with open("scripts/build-xwayland.sh", "r") as f:
              code = f.read()

          # Находим старую функцию build_autotools
          start_idx = code.find("build_autotools() {")
          # Находим конец функции (следующая функция или стадия)
          end_idx = code.find("stage_should_run() {")

          if start_idx != -1 and end_idx != -1:
              # Наша новая, абсолютно стабильная пошаговая функция сборки
              new_function = """build_autotools() {
              local name="$1"; shift
              local src="$SRC_ROOT/$name"
              echo "==> Custom compiling autotools project: $name"
              ( cd "$src" && \\
                  if { [ -f .tawc-autotools-host ] && [ "$(cat .tawc-autotools-host)" != "$TRIPLE" ]; } || \\
                     { [ ! -f .tawc-autotools-host ] && [ -f Makefile ]; }; then \\
                      make distclean >/dev/null 2>&1 || make clean >/dev/null 2>&1 || true; \\
                      rm -f config.cache; \\
                  fi && \\
                  if [ ! -f configure ]; then \\
                      echo "==> Running manual bootstrap sequence for $name" && \\
                      libtoolize --copy --force && \\
                      aclocal -I m4 -I /usr/share/aclocal --force && \\
                      autoconf --force && \\
                      automake --add-missing --copy --foreign || true; \\
                  fi && \\
                  configure_autotools "$@" && \\
                  make -j"$(nproc)" && \\
                  make install && \\
                  printf "%s\\n" "$TRIPLE" > .tawc-autotools-host )
          }

          """
              # Заменяем кусок кода
              patched_code = code[:start_idx] + new_function + code[end_idx:]
              with open("scripts/build-xwayland.sh", "w") as f:
                  f.write(patched_code)
              print("SUCCESS: build_autotools() has been atomically patched!")
          else:
              print("ERROR: Could not find target functions for patching!")
              exit(1)
          '

          # Дополнительно чиним затирание системного ACLOCAL_PATH в начале скрипта
          sed -i 's|export ACLOCAL_PATH="$PREFIX/share/aclocal:${ACLOCAL_PATH:-}"|export ACLOCAL_PATH="$PREFIX/share/aclocal:/usr/share/aclocal:/usr/share/aclocal-1.16:${ACLOCAL_PATH:-}"|g' scripts/build-xwayland.sh
          
          # Убираем обрезку вывода логов
          sed -i 's/| tail -5//g' scripts/build-xwayland.sh || true
          sed -i 's/| tail -3//g' scripts/build-xwayland.sh || true

      - name: Run Complete Xwayland Build Pipeline
        run: |
          export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16"
          ./scripts/build-xwayland.sh --abi=aarch64
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Upload Xwayland Install Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-android-aarch64
          path: build/xwayland-aarch64/install/
