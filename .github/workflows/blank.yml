name: Test Libffi Fix

on:
  workflow_dispatch:

jobs:
  test-libffi:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool libtool-bin autoconf-archive \
            meson ninja-build pkg-config python3 git curl

      - name: Prepare Scripts
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/ensure-deps.sh --verify-all

      - name: Quick Libffi Fix + Build
        run: |
          # Обёртки
          mkdir -p $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          cat << 'EOF' > $HOME/.local/bin/aclocal
#!/bin/bash
exec /usr/bin/aclocal "$@" -I /usr/share/aclocal -I /usr/share/aclocal-1.16 -I m4 --force
EOF

          cat << 'EOF' > $HOME/.local/bin/autoreconf
#!/bin/bash
export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16:${ACLOCAL_PATH:-}"
exec /usr/bin/autoreconf "$@"
EOF

          chmod +x $HOME/.local/bin/aclocal $HOME/.local/bin/autoreconf
          export PATH="$HOME/.local/bin:$PATH"

          # Патч скрипта
          sed -i 's/autoreconf -fi/autoreconf -fiv --install/g' scripts/build-xwayland.sh

          # Принудительный libtoolize перед autogen
          sed -i '/NOCONFIGURE=1 .*autogen.sh/ i \ \ \ \ \ \ (cd "$src" \&\& libtoolize --force --copy \&\& aclocal -I m4 --force || true)' scripts/build-xwayland.sh

          # Чистка и запуск
          rm -rf deps/xwayland-src/libffi build/xwayland-aarch64 2>/dev/null || true
          ./scripts/build-xwayland.sh --only=libffi
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.2.12479018
          PKG_CONFIG_ALLOW_CROSS: "1"
      # Установка окружения сборщика
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            autoconf-archive \
            m4 \
            pkg-config \
            texinfo \
            gettext \
            git \
            curl \
            python3

      # Подготовка скриптов и скачивание зависимостей (включая клонирование libffi)
      - name: Prepare Build Scripts & Pre-clone Deps
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/ensure-deps.sh --verify-all

      # Включаем МАКСИМАЛЬНЫЙ ВЫВОД ЛОГОВ (Патчим скрытие вывода в build-xwayland.sh)
      - name: Inject Max Verbose Flags
        run: |
          # Включаем трассировку bash команд изнутри скрипта
          sed -i '2i set -x' scripts/build-xwayland.sh
          
          # Убираем глушение потока ошибок (2>/dev/null) в строке генерации autotools
          sed -i 's/2>\/dev\/null//g' scripts/build-xwayland.sh
          
          # Заменяем "autoreconf -fi" на "autoreconf -fiv" для детального трейса
          sed -i 's/autoreconf -fi/autoreconf -fiv/g' scripts/build-xwayland.sh

      # ТОЧЕЧНЫЙ ФИКС: Подбрасываем макросы Libtool прямо в исходники libffi
      - name: Inject Libtool Macros into Libffi Local Folder
        run: |
          # Создаем структуру папок, если вдруг её нет
          mkdir -p deps/xwayland-src/libffi/m4
          
          # Копируем критически важные макросы хоста напрямую в локальную m4 проекта
          cp /usr/share/aclocal/libtool.m4 deps/xwayland-src/libffi/m4/
          cp /usr/share/aclocal/lt*.m4 deps/xwayland-src/libffi/m4/
          
          echo "=== Local m4 directory contents ==="
          ls -la deps/xwayland-src/libffi/m4/

      # ТЕСТОВЫЙ ЗАПУСК С ПОЛНЫМ ЛОГОМ
      - name: Debug single libffi build stage (Verbose)
        run: |
          ./scripts/build-xwayland.sh --only=libffi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          PKG_CONFIG_ALLOW_CROSS: "1"
      # Установка окружения сборщика
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            autoconf-archive \
            m4 \
            pkg-config \
            texinfo \
            gettext \
            git \
            curl \
            python3

      # Подготовка скриптов
      - name: Prepare Build Scripts & Verify Deps
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/ensure-deps.sh --verify-all

      # Включаем МАКСИМАЛЬНЫЙ ВЫВОД ЛОГОВ И ПАТЧИМ СКРИПТ
      - name: Inject Max Verbose Flags & Fix ACLOCAL_PATH
        run: |
          # Включаем трассировку bash команд изнутри скрипта (выведет вообще всё)
          sed -i '2i set -x' scripts/build-xwayland.sh
          
          # Убираем обрезку вывода через tail
          sed -i 's/| tail -5//g' scripts/build-xwayland.sh
          sed -i 's/| tail -3//g' scripts/build-xwayland.sh
          
          # Заменяем "autoreconf -fi" на "autoreconf -fiv" (verbose для autotools)
          sed -i 's/autoreconf -fi/autoreconf -fiv/g' scripts/build-xwayland.sh

          # ГЛАВНЫЙ ФИКС: исправляем жестко зашитое затирание переменной ACLOCAL_PATH
          sed -i 's|export ACLOCAL_PATH="$PREFIX/share/aclocal"|export ACLOCAL_PATH="$PREFIX/share/aclocal:/usr/share/aclocal:/usr/share/aclocal-1.16"|g' scripts/build-xwayland.sh

      # Полная очистка перед тестом
      - name: Clear old libffi cache
        run: |
          rm -rf deps/xwayland-src/libffi
          rm -rf build/xwayland-aarch64/build-libffi || true

      # ТЕСТОВЫЙ ЗАПУСК С ПОЛНЫМ ЛОГОМ
      - name: Debug single libffi build stage (Verbose)
        run: |
          ./scripts/build-xwayland.sh --only=libffi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          PKG_CONFIG_ALLOW_CROSS: "1"
