- name: Fix build_autotools function (Final Version)
        run: |
          mkdir -p $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          # 1. Создаем правильные обертки для инструментов автосборки
          cat > $HOME/.local/bin/aclocal << 'EOL'
          #!/bin/bash
          exec /usr/bin/aclocal "$@" -I /usr/share/aclocal -I /usr/share/aclocal-1.16 -I m4 --force
          EOL
          
          cat > $HOME/.local/bin/autoreconf << 'EOL'
          #!/bin/bash
          export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16:${ACLOCAL_PATH:-}"
          exec /usr/bin/autoreconf "$@"
          EOL
          
          chmod +x $HOME/.local/bin/aclocal $HOME/.local/bin/autoreconf
          export PATH="$HOME/.local/bin:$PATH"

          # 2. Создаем новую функцию с исправленной логикой генерации конфигов
          cat > /tmp/fixed_build_autotools << 'FIXED'
          build_autotools() {
              local name="$1"; shift
              local src="$SRC_ROOT/$name"
              ( cd "$src" && \
                  if { [ -f .tawc-autotools-host ] && [ "$(cat .tawc-autotools-host)" != "$TRIPLE" ]; } || \
                     { [ ! -f .tawc-autotools-host ] && [ -f Makefile ]; }; then \
                      make distclean >/dev/null 2>&1 || make clean >/dev/null 2>&1 || true; \
                      rm -f config.cache; \
                  fi && \
                  if [ ! -f configure ]; then \
                      echo "==> Running fixed autogen for $name" && \
                      libtoolize --force --copy && \
                      aclocal -I m4 --force && \
                      autoreconf -fiv --install && \
                      touch configure; \
                  fi && \
                  configure_autotools "$@" && \
                  make -j"$(nproc)" && \
                  make install && \
                  printf '%s\n' "$TRIPLE" > .tawc-autotools-host )
          }
          FIXED

          # 3. Полностью удаляем оригинальную однострочную функцию из скрипта
          sed -i '/build_autotools() {/,/}/d' scripts/build-xwayland.sh
          
          # 4. Внедряем нашу новую исправленную функцию в тело скрипта
          cat /tmp/fixed_build_autotools >> scripts/build-xwayland.sh

          # 5. Очищаем старые артефакты libffi перед сборкой
          rm -rf deps/xwayland-src/libffi build/xwayland-aarch64 2>/dev/null || true
