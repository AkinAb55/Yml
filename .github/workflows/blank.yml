name: Debug buildXwaylandArm64-v8a

on:
  workflow_dispatch:

jobs:
  debug-xwayland:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      DEBIAN_FRONTEND: noninteractive
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.13846066

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          set -x
          uname -a
          lsb_release -a || true
          env | sort
          df -h
          free -h
          nproc

      - name: Install build dependencies
        run: |
          set -ex

          sudo apt-get update

          sudo apt-get install -y \
            meson \
            ninja-build \
            pkg-config \
            autoconf \
            automake \
            libtool \
            m4 \
            make \
            perl \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-mako \
            python3-jinja2 \
            python3-libxml2 \
            xsltproc \
            flex \
            bison \
            gettext \
            gperf \
            xutils-dev \
            libxml2-utils \
            curl \
            git \
            patch

      - name: Verify tools
        run: |
          set -x

          which meson
          meson --version

          which ninja
          ninja --version

          which autoreconf
          autoreconf --version

          which libtoolize
          libtoolize --version

          which aclocal
          aclocal --version

          which pkg-config
          pkg-config --version

          which python3
          python3 --version

          echo "NDK:"
          ls -la "$ANDROID_NDK_HOME"

      - name: Enable bash tracing
        run: |
          echo 'export PS4="+ [\${BASH_SOURCE##*/}:\${LINENO}] "' >> ~/.bashrc

      - name: Run build-xwayland
        shell: bash
        continue-on-error: true
        run: |
          set -Eeuxo pipefail

          mkdir -p logs

          bash -x scripts/build-xwayland.sh \
            2>&1 | tee logs/build-xwayland.log

      - name: Show build directory
        if: always()
        run: |
          set +e

          echo "========== BUILD =========="
          find build -maxdepth 3

          echo
          echo "========== INSTALL =========="
          find build/xwayland-aarch64 -maxdepth 3

      - name: Dump configure logs
        if: always()
        run: |
          set +e

          mkdir -p logs/configure

          find deps/xwayland-src \
            -name config.log \
            -exec cp --parents {} logs/configure \;

          find build \
            -name meson-log.txt \
            -exec cp --parents {} logs/configure \;

      - name: Show last configure logs
        if: always()
        run: |
          set +e

          find deps/xwayland-src -name config.log | while read f; do
            echo
            echo "======================================"
            echo "$f"
            echo "======================================"
            tail -200 "$f"
          done

          find build -name meson-log.txt | while read f; do
            echo
            echo "======================================"
            echo "$f"
            echo "======================================"
            tail -200 "$f"
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-debug
          path: |
            logs
            build/**/meson-logs/**
            deps/**/config.log
            build/**/build.ninja
            build/**/android-cross.ini
