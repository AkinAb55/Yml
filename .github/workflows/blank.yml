name: Remote Build PixelSpark

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем чужой репозиторий в текущую папку
      - name: Clone Remote Repository
        run: |
          git clone https://github.com/Ehtasham-Arif01/PixelSpark.git .
          
      # 2. Устанавливаем JDK (для PixelSpark лучше 17 или 21)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на запуск Gradle
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # 4. Собираем проект
      # Если это Android — используем assembleDebug. Если Java — build.
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      # 5. Сохраняем готовый файл (APK)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelSpark-Build
          path: app/build/outputs/apk/debug/*.apk
