name: Build External Repository

on:
  workflow_dispatch: # Позволяет запускать сборку вручную через вкладку Actions

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем СВОЙ репозиторий (чтобы активировать рабочую директорию)
      - name: Checkout own repo
        uses: actions/checkout@v4

      # 2. Клонируем СТОРОННИЙ репозиторий в подпапку target-app
      - name: Checkout external repository
        run: |
          git clone https://github.com/whesley264-oss/offline-camera-translator.git target-app

      # 3. Настраиваем Java (необходима для сборки Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 4. Настраиваем Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'target-app/package-lock.json'

      # 5. Устанавливаем зависимости внутри склонированного проекта
      - name: Install dependencies
        run: |
          cd target-app
          npm install

      # 6. Собираем Android APK (отладочную сборку)
      - name: Build Android Release
        run: |
          cd target-app/android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # 7. Сохраняем готовый APK как артефакт сборки GitHub
      - name: Upload APK Artifact
        uses: actions/artifacts@v4
        with:
          name: app-release-apk
          path: target-app/android/app/build/outputs/apk/release/app-release.apk
