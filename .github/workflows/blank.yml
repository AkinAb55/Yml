name: Test Rust Compositor Build
on:
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'

      - name: Setup Rust + cargo-ndk
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install --locked cargo-ndk
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          ndk: "27.2.12479018" # Экшен всё равно поставит 27.3.13750724

      - name: Build compositor
        run: |
          cd compositor
          
          # Хак: Синхронизируем переменные с реальностью раннера GitHub
          export ANDROID_NDK_HOME="/usr/local/lib/android/sdk/ndk/27.3.13750724"
          unset ANDROID_NDK_ROOT
          
          echo "Проверяем доступность папки NDK:"
          ls -la $ANDROID_NDK_HOME
          
          cargo ndk -t aarch64-linux-android --platform 29 build --release
          cargo ndk -t x86_64-linux-android --platform 29 build --release
        shell: bash
