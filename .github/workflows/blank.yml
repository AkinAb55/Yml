name: Verify Wayland Host Environment

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-24.04

    env:
      WAYLAND_PREFIX: /tmp/wayland-host

    steps:
      - uses: actions/checkout@v4

      # Здесь должен быть твой шаг сборки Wayland 1.25

      - name: Export Wayland Host Environment
        run: |
          echo "${WAYLAND_PREFIX}/bin" >> "$GITHUB_PATH"

          echo "PKG_CONFIG_LIBDIR=${WAYLAND_PREFIX}/lib/x86_64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> "$GITHUB_ENV"

      - name: Verify Environment
        shell: bash
        run: |
          set +e

          echo "========================"
          echo "PATH"
          echo "========================"
          echo "$PATH"

          echo
          echo "========================"
          echo "WAYLAND BIN"
          echo "========================"
          ls -la "${WAYLAND_PREFIX}/bin"

          echo
          echo "========================"
          echo "WHICH"
          echo "========================"
          which wayland-scanner
          echo "exit=$?"

          echo
          echo "========================"
          echo "VERSION"
          echo "========================"
          wayland-scanner --version
          echo "exit=$?"

          echo
          echo "========================"
          echo "PKG_CONFIG_LIBDIR"
          echo "========================"
          echo "$PKG_CONFIG_LIBDIR"

          echo
          echo "========================"
          echo "PKG FILES"
          echo "========================"
          find "$PKG_CONFIG_LIBDIR" -name "*.pc"

          echo
          echo "========================"
          echo "WAYLAND CLIENT"
          echo "========================"
          pkg-config --modversion wayland-client
          echo "exit=$?"

          echo
          echo "========================"
          echo "WAYLAND SERVER"
          echo "========================"
          pkg-config --modversion wayland-server
          echo "exit=$?"

          echo
          echo "========================"
          echo "WAYLAND EGL"
          echo "========================"
          pkg-config --modversion wayland-egl
          echo "exit=$?"

          echo
          echo "========================"
          echo "WAYLAND SCANNER PC"
          echo "========================"
          pkg-config --modversion wayland-scanner
          echo "exit=$?"
