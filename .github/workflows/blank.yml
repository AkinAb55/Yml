name: "Build Xwayland Test (no Gradle, verbose)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  xwayland-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install minimal host packages
        run: |
          set -ex
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git curl cmake meson ninja-build pkg-config \
            python3 python3-pip python3-setuptools python3-distutils \
            autoconf automake libtool libtool-bin autoconf-archive m4 \
            xsltproc libxml2-utils xmlto pkgconf libffi-dev libexpat1-dev \
            libx11-dev libxcb1-dev libxkbcommon-dev libdrm-dev libpixman-1-dev \
            patchelf gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu || true
          sudo pip3 install --upgrade meson ninja --break-system-packages || true
        shell: bash

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 29
          ndk: 27.2.12479018
          components: |
            platform-tools
            "platforms;android-29"
            "ndk;27.2.12479018"

      - name: Export NDK env
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "${HOME}/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Ensure vendored deps (critical for xwayland)
        run: |
          set -ex
          ./scripts/ensure-deps.sh wayland wayland-protocols xwayland xkbcomp xkeyboard-config xorgproto xcb-proto libxcb libx11 libxkbfile pixman libdrm libxshmfence libmd || true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        shell: bash

      - name: "Preflight: wayland-scanner & autotools preregeneration"
        run: |
          set -ex
          if ! command -v wayland-scanner >/dev/null 2>&1; then
            TMP=/tmp/wayland-native
            rm -rf "$TMP"; mkdir -p "$TMP"
            curl -fsSL https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz | tar -xz -C "$TMP" --strip-components=1
            (cd "$TMP" && meson setup build --prefix=$HOME/.local -Ddocumentation=false -Dtests=false -Dlibraries=false)
            ninja -C "$TMP/build" wayland-scanner
            mkdir -p $HOME/.local/bin
            cp "$TMP/build/wayland-scanner" $HOME/.local/bin/
            chmod +x $HOME/.local/bin/wayland-scanner
            echo "WAYLAND_SCANNER installed to $HOME/.local/bin"
          fi
          PREFIX="$PWD/build/autotools-prefix"
          mkdir -p "$PREFIX"
          export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16:${PREFIX}/share/aclocal:$ACLOCAL_PATH"
          export PKG_CONFIG_LIBDIR="${PREFIX}/lib/pkgconfig:${PREFIX}/share/pkgconfig:${PKG_CONFIG_LIBDIR:-}"
          for d in deps/libhybris/hybris deps/xwayland-src/*; do
            if [ -f "$d/configure.ac" ]; then
              echo "=> prereg $d"
              (cd "$d" && libtoolize --force --copy || true && aclocal -I m4 -I /usr/share/aclocal -I "${PREFIX}/share/aclocal" || true && autoconf --force || true && autoheader --force || true && automake --add-missing --copy --foreign || true && autoreconf -vfi || true)
            fi
          done
        shell: bash

      - name: Diagnostic versions
        run: |
          set -ex
          which wayland-scanner || true; wayland-scanner --version || true
          pkg-config --version || true
          meson --version || true
          ninja --version || true
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-unset}"
        shell: bash

      - name: Run scripts/build-xwayland.sh (verbose)
        run: |
          set -ex
          chmod +x scripts/build-xwayland.sh
          bash -x scripts/build-xwayland.sh --clean
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          PKG_CONFIG_ALLOW_CROSS: "1"
        shell: bash

      - name: List produced artifacts & run readelf checks
        run: |
          set -ex
          for dir in build/xwayland-*; do
            [ -d "$dir/install" ] || continue
            echo "==> $dir/install contents"
            find "$dir/install" -maxdepth 4 -type f -printf "%p %s\n" | sed -n '1,200p' || true
            for lib in "$dir/install/lib"/*.so*; do
              [ -f "$lib" ] || continue
              echo "--- $lib ---"
              file "$lib" || true
              readelf -h "$lib" || true
              readelf -d "$lib" || true
            done
          done
        shell: bash

      - name: Upload built install trees (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-install
          path: build/xwayland-*/install
          if-no-files-found: warn
