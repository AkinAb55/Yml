name: TAWC Wayland Debug (Scanner + Meson)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC
        uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config \
            libffi-dev libexpat1-dev \
            python3 curl git \
            wayland-protocols

      # 🔥 Build correct wayland-scanner (critical)
      - name: Build wayland-scanner 1.25.0
        run: |
          curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz | tar xz
          cd wayland-1.25.0

          meson setup build \
            --prefix=/usr/local \
            -Dtests=false \
            -Ddocumentation=false \
            -Dlibraries=false

          ninja -C build
          sudo ninja -C build install

      # 🔥 HARD FIX environment (important)
      - name: Export Wayland environment
        run: |
          echo "WAYLAND_SCANNER=/usr/local/bin/wayland-scanner" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV

      - name: Verify scanner
        run: |
          echo "===== WHICH ====="
          which wayland-scanner

          echo "===== VERSION ====="
          wayland-scanner --version

          echo "===== PKG-CONFIG ====="
          pkg-config --modversion wayland-scanner

      # 🔥 ONLY WAYLAND MESON TEST (no xwayland yet)
      - name: Configure Wayland (Meson test)
        run: |
          meson setup build-wayland \
            deps/xwayland-src/wayland/src \
            --prefix=/tmp/test \
            --buildtype=debug \
            -Ddefault_library=shared \
            -Dscanner=false \
            -Dtests=false \
            -Ddocumentation=false \
            -Ddtd_validation=false \
            -Dlibraries=true \
            --wipe

      - name: Show Meson logs
        if: always()
        run: |
          echo "===== MESON LOG ====="
          cat build-wayland/meson-logs/meson-log.txt || true
