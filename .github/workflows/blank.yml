name: Debug Xwayland Libffi Forensics

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson ninja-build \
            autoconf automake libtool libtool-bin \
            pkg-config \
            python3 \
            m4 perl curl git \
            xsltproc

      # 🔍 CRITICAL: toolchain fingerprint
      - name: Autotools version dump
        run: |
          set -x
          autoconf --version
          automake --version
          libtoolize --version
          aclocal --version
          echo "==== aclocal dirs ===="
          aclocal --print-ac-dir

          echo "==== search LT_SYS_SYMBOL_USCORE ===="
          grep -R "LT_SYS_SYMBOL_USCORE" /usr/share/aclocal || true

      - name: Prepare scripts
        run: |
          find scripts/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      # ❗ MINIMAL patch ONLY for visibility
      - name: Enable full autotools logs
        run: |
          sed -i 's/| tail -5//g' scripts/build-xwayland.sh
          sed -i 's/| tail -3//g' scripts/build-xwayland.sh
          sed -i 's/2>\/dev\/null//g' scripts/build-xwayland.sh

      # 🔥 CRASH ISOLATION
      - name: Build ONLY libffi (no modifications)
        run: |
          set -e
          rm -rf deps/xwayland-src/libffi
          rm -rf build/xwayland-aarch64/build-libffi || true

          ./scripts/build-xwayland.sh --only=libffi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          PKG_CONFIG_ALLOW_CROSS: "1"
