name: Debug TAWC Xwayland Only
on:
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"

jobs:
  test-xwayland-fix:
    runs-on: ubuntu-24.04
    steps:
      # Скачиваем оригинальный репозиторий TAWC напрямую
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: recursive

      - name: Install Host Build Tools & Autotools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake meson ninja-build pkg-config \
            autoconf automake libtool libtool-bin m4 gettext bison flex \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu curl tar

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}

      - name: Fix Autotools Environment
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
          echo "VERBOSE=1" >> $GITHUB_ENV

      - name: Run TAWC Xwayland Build (Trace Mode)
        run: |
          echo "=== Проверка структуры скачанного TAWC ==="
          pwd
          ls -la
          if [ -d "scripts" ]; then ls -la scripts; fi

          # Делаем скрипты оригинального репозитория исполняемыми
          find . -name "*.sh" -exec chmod +x {} + 2>/dev/null || true
          
          # Запуск bionic-сборки Xwayland в режиме трассировки строк (-x)
          bash -x scripts/build-xwayland.sh --abi=aarch64
