name: Build Glory Cam APK (External)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      # 1. Клонируем репозиторий tharushaperera104-create/glory-cam-v2-glory-studio
      # Указываем правильный формат названия и ветку main
      - name: Checkout external code
        uses: actions/checkout@v4
        with:
          repository: 'tharushaperera104-create/glory-cam-v2-glory-studio'
          ref: 'main'

      # 2. Настраиваем Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Создаем local.properties для Android SDK
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # 4. Собираем отладочный APK
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache

      # 5. Выгружаем готовый APK в артефакты
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: glory-cam-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 6. Сохраняем логи в случае неудачи
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            app/build/reports/
          retention-days: 7
