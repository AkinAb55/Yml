name: Build External Android App

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из ЧУЖОГО репозитория напрямую
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: 'malsmak372-cmyk/vidi-ai-ultimate-editor'
        ref: 'main' # Название ветки (если там master, замените на master)

    # 2. Устанавливаем Java 8 (необходима для старых версий Gradle / SDK 29)
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. Настраиваем Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. Генерируем локальный gradlew, если его нет в чужом репозитории, и даем права
    - name: Initialize Gradle Wrapper
      run: |
        gradle wrapper
        chmod +x gradlew

    # 5. Собираем отладочный APK (Debug)
    # Сборка Release без ключей подписи упадет, поэтому для теста делаем assembleDebug
    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    # 6. Загружаем готовые APK файлы в артефакты GitHub
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-apks
        path: app/build/outputs/apk/debug/*.apk
