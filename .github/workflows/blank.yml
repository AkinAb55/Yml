name: Build Vivoto

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Vivoto project
        uses: actions/checkout@v4
        with:
          repository: nowfalvaasits/vivoto
          ref: master
          path: vivoto

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Build with Gradle
        working-directory: ./vivoto
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vivoto-APK
          path: vivoto/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
