- name: Fix build_autotools function (Critical)
        run: |
          mkdir -p $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          cat > $HOME/.local/bin/aclocal << 'EOL'
#!/bin/bash
exec /usr/bin/aclocal "$@" -I /usr/share/aclocal -I /usr/share/aclocal-1.16 -I m4 --force
EOL

          cat > $HOME/.local/bin/autoreconf << 'EOL'
#!/bin/bash
export ACLOCAL_PATH="/usr/share/aclocal:/usr/share/aclocal-1.16:${ACLOCAL_PATH:-}"
exec /usr/bin/autoreconf "$@"
EOL

          chmod +x $HOME/.local/bin/aclocal $HOME/.local/bin/autoreconf
          export PATH="$HOME/.local/bin:$PATH"
          
          # === КРИТИЧЕСКИЙ ПАТЧ: полностью заменяем build_autotools ===
          cat > /tmp/build_autotools_fixed.sh << 'FIX'
build_autotools() {
    local name="$1"; shift
    local src="$SRC_ROOT/$name"
    ( cd "$src" && \
        if { [ -f .tawc-autotools-host ] && [ "$(cat .tawc-autotools-host)" != "$TRIPLE" ]; } || \
           { [ ! -f .tawc-autotools-host ] && [ -f Makefile ]; }; then \
            make distclean >/dev/null 2>&1 || make clean >/dev/null 2>&1 || true; \
            rm -f config.cache; \
        fi && \
        if [ ! -f configure ]; then \
            libtoolize --force --copy && \
            aclocal -I m4 --force && \
            autoreconf -fiv --install; \
        fi && \
        configure_autotools "$@" && \
        make -j"$(nproc)" && \
        make install && \
        printf '%s\n' "$TRIPLE" > .tawc-autotools-host )
}
FIX

          # Заменяем старую функцию на новую
          sed -i '/^build_autotools() {/,/^}/c\' /tmp/build_autotools_fixed.sh scripts/build-xwayland.sh
          # Чистка
          rm -rf deps/xwayland-src/libffi build/xwayland-aarch64 2>/dev/null || true
