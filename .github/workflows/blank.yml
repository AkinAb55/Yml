name: Automated Windows Build WayLandIE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # Автосборка каждое воскресенье в 00:00 UTC
  workflow_dispatch: # Возможность ручного запуска кнопкой

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1. Клонируем сторонний репозиторий AstroCODEsky напрямую в корень
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'AstroCODEsky/WayLandIE'
        ref: 'main'
        submodules: 'recursive'

    # 2. Настраиваем Java 17 (необходима для работы javac, d8 и других инструментов SDK)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Настраиваем Android SDK и NDK (устанавливаем NDK r25, как в требованиях)
    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.2.9519653'

    # 4. Запускаем оригинальный PowerShell скрипт автора
    - name: Build APK via Author's PowerShell Script
      shell: pwsh
      run: |
        # Переходим в папку с приложением, как написано в README
        cd android-app
        
        # Запускаем скрипт, передавая RequireNative и путь к NDK из переменной окружения
        .\tools\build-apk.ps1 `
          -RequireNative `
          -NdkRoot "$env:ANDROID_NDK_ROOT"

    # 5. Собираем финальный бандл (APK + скрипты рантайма Linux для Termux)
    - name: Prepare Release Bundle
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .\release-dist\android-app
        New-Item -ItemType Directory -Force -Path .\release-dist\linux-runtime
        New-Item -ItemType Directory -Force -Path .\release-dist\scripts
        
        # Копируем собранный MVP APK из папки out, которую создал скрипт автора
        Copy-Item -Path .\android-app\out\waylandie-display-mvp.apk -Destination .\release-dist\android-app\
        
        # Копируем остальные компоненты системы
        Copy-Item -Recurse -Force -Path .\linux-runtime\* -Destination .\release-dist\linux-runtime\
        Copy-Item -Recurse -Force -Path .\scripts\* -Destination .\release-dist\scripts\
        if (Test-Path .\README.md) { Copy-Item -Path .\README.md -Destination .\release-dist\ }
        
        Write-Host "=== Содержимое бандла ==="
        Get-ChildItem -Path .\release-dist -Recurse

    # 6. Публикация готового ZIP-архива в артефакты GitHub Actions
    - name: Upload Complete WayLandIE Bundle
      uses: actions/upload-artifact@v4
      with:
        name: WayLandIE-WindowsCompiled-Bundle
        path: .\release-dist\
