name: Build TAWC (Full Monolithic Build)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в интерфейсе GitHub

jobs:
  build-apk:
    runs-on: ubuntu-24.04 # Используем актуальный дистрибутив Ubuntu с новым ядром и glibc
    
    steps:
      # 1. Клонируем оригинальный репозиторий без создания форка
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: 'recursive' # Инициализируем все встроенные зависимости проекта

      # 2. Установка Java-окружения для Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Установка и настройка Android SDK и NDK (версия строго из build.gradle)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK (27.2.12479018)
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      # 4. Установка ВСЕХ системных зависимостей хоста
      # Необходимы для Mesa, Zink, Xwayland, libhybris, компиляции шрифтов и pixman
      - name: Install Build Host Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3-pip \
            bison \
            flex \
            gettext \
            texinfo \
            gperf \
            pkg-config \
            tar \
            zstd \
            libssl-dev \
            glslang-tools \
            libxkbcommon-dev \
            libpixman-1-dev \
            libwayland-dev \
            wayland-protocols \
            m4 \
            xsltproc

      # 5. Установка и настройка Rust для Android кросс-компиляции
      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android, x86_64-linux-android'

      # Утилита cargo-ndk критически важна для сборки модуля :compositor
      - name: Install cargo-ndk tool
        run: cargo install cargo-ndk

      # 6. Подготовка и верификация зависимостей репозитория
      # Делаем исполняемыми все bash-скрипты сборки внутренних модулей
      - name: Prepare Build Scripts & Verify Deps
        run: |
          find scripts/ tawcroot/ -type f -name "*.sh" -exec chmod +x {} +
          ./scripts/ensure-deps.sh --verify-all

      # 7. Настройка кэширования для ускорения повторных сборок
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 8. Финальная сборка полной версии приложения
      # Передаем параметры проекта (-P), принудительно заставляющие Gradle
      # собрать АБСОЛЮТНО ВСЕ модули, архитектуры, бэкенды графики и Xwayland.
      - name: Compile Full Debug APK via Gradle
        run: |
          ./gradlew assembleDebug \
            -PtawcAbis=arm64-v8a,x86_64 \
            -PtawcMethods=tawcroot,proot,chroot \
            -PtawcGraphics=libhybris,libhybris-zink,gfxstream,cpu \
            -PtawcXwayland=true \
            -PtawcAllFilesAccess=true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # 9. Экспорт готового файла (Артефакта)
      - name: Upload Complete APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawc-ultimate-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
