name: Build Android App from Fork

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в репозитории Yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код конкретно из вашего форка приложения
    - name: Checkout Android Project
      uses: actions/checkout@v4
      with:
        repository: 'AkinAb55/vidi-ai-ultimate-editor'
        ref: 'main' # Ветка main вашего форка

    # 2. Устанавливаем Java 17 для инструментов Android SDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Настраиваем Android SDK и принимаем лицензии
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. Устанавливаем Java 8 для сборки самого приложения
    - name: Set up JDK 8 for Legacy Gradle
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # 5. Собираем проект через Gradle
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }} # Переключаем окружение на Java 8 перед сборкой

    # 6. Сохраняем готовые APK в артефакты репозитория Yml
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-apks
        path: app/build/outputs/apk/debug/*.apk
