name: Fix Xwayland

on:
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"

jobs:
  build-xwayland:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: recursive

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool libtool-bin \
            perl xsltproc gettext xutils-dev meson ninja-build pkg-config \
            libwayland-dev wayland-protocols
        shell: bash

      - name: Setup Android
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}

      - name: Fix ENV
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=\( {ANDROID_SDK_ROOT}/ndk/ \){ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "PATH=\( {HOME}/.local/bin: \){PATH}" >> $GITHUB_PATH
          echo "ANDROID_NDK_HOME=\( {ANDROID_SDK_ROOT}/ndk/ \){ANDROID_NDK_VERSION}"  # debug
        shell: bash

      - name: Check NDK
        run: |
          echo "NDK HOME: $ANDROID_NDK_HOME"
          ls "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep aarch64 || echo "No aarch64 clang"
        shell: bash

      - name: Ensure deps
        run: ./scripts/ensure-deps.sh xwayland-src || true

      - name: Build Xwayland
        run: |
          set -x
          bash -x scripts/build-xwayland.sh --abi=aarch64 --clean 2>&1 | tee xwayland.log
        shell: bash

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-log
          path: xwayland.log
