name: Build wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-24.04 # Используем свежий дистрибутив с актуальными версиями meson/ninja

    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # КРИТИЧЕСКИ ВАЖНО: выкачиваем labwc, minigbm и wlroots внутри проекта

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK r28
      run: |
        sdkmanager --install "ndk;28.0.12433566" # Устанавливаем NDK r28, который требуется проекту
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV

    - name: Install Native Build Tools (Meson, Ninja, AIDL)
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build pkg-config build-essential

    - name: Build Native C/C++ Core (wlroots & labwc-android)
      run: |
        # Переходим в директорию с нативным кодом проекта (в зависимости от структуры папок)
        # Если у автора скрипт сборки лежит в корне, вызываем его, иначе настраиваем кросс-компиляцию:
        
        # Создаем кросс-файл для Meson под архитектуру Android aarch64 (ARM64)
        cat <<EOF > android-cross.txt
        [binaries]
        c = '${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang'
        cpp = '${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++'
        ar = '${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
        strip = '${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'

        [host_machine]
        system = 'android'
        cpu_family = 'aarch64'
        cpu = 'armv8-a'
        endian = 'little'
        EOF

        # Запускаем сборку нативной части (wlroots / лаунчер), если автор использует стандартную схему:
        # Примечание: Если в репозитории уже есть файл build.sh для натива, можно просто вызвать: chmod +x build.sh && ./build.sh
        if [ -f "build.sh" ]; then
          chmod +x build.sh
          ./build.sh
        else
          # Стандартная сборка через meson в папку build_native
          meson setup build_native --cross-file android-cross.txt --buildtype=release
          ninja -C build_native
        fi

    - name: Copy Native Libraries to Android JNI Folder
      run: |
        # Создаем структуру папок для Gradle, чтобы он увидел наши .so файлы
        mkdir -p app/src/main/jniLibs/arm64-v8a/
        
        # Копируем скомпилированные .so файлы из папки сборки в ресурсы приложения
        # (Проверяем все возможные места появления библиотек послеninja)
        find build_native/ -name "*.so" -exec cp {} app/src/main/jniLibs/arm64-v8a/ \; || true
        
        # Если проект собирает исполняемый файл (бинарник композитора), его тоже нужно положить в assets или jniLibs
        find build_native/ -maxdepth 3 -executable -type f -not -name "*.so" -exec cp {} app/src/main/jniLibs/arm64-v8a/lib_native_core.so \; || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Android APK with Gradle
      run: ./gradlew assembleDebug --stacktrace # Собираем отладочный APK-файл

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7 # Хранить готовый файл в течение 7 дней
