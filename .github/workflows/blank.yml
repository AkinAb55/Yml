name: Test Wayland Scanner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          repository: wmww/tawc
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            pkg-config \
            build-essential \
            curl python3

      - name: Show system versions BEFORE install
        run: |
          echo "===== BEFORE ====="

          which wayland-scanner || true
          wayland-scanner --version || true

          echo
          pkg-config --modversion wayland-scanner || true

          echo
          pkg-config --variable pc_path pkg-config

          echo
          find /usr -name "wayland-scanner.pc" 2>/dev/null

      - name: Build Wayland 1.25 scanner
        run: |
          mkdir /tmp/wayland
          cd /tmp/wayland

          curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz \
          | tar xz --strip-components=1

          meson setup build \
            --prefix=/usr/local \
            -Ddocumentation=false \
            -Dtests=false \
            -Dlibraries=false

          ninja -C build

          sudo ninja -C build install

      - name: Dump EVERYTHING after install
        run: |

          echo "========== PATH =========="
          echo "$PATH"

          echo
          echo "========== PKG_CONFIG_PATH =========="
          echo "${PKG_CONFIG_PATH:-EMPTY}"

          echo
          echo "========== PKG_CONFIG_LIBDIR =========="
          echo "${PKG_CONFIG_LIBDIR:-EMPTY}"

          echo
          echo "========== WHICH =========="
          which wayland-scanner

          echo
          ls -l $(which wayland-scanner)

          echo
          echo "========== VERSION =========="
          wayland-scanner --version

          echo
          echo "========== pkg-config =========="
          which pkg-config
          pkg-config --version

          echo
          echo "========== pc search path =========="
          pkg-config --variable pc_path pkg-config

          echo
          echo "========== modversion =========="
          pkg-config --modversion wayland-scanner || true

          echo
          echo "========== cflags =========="
          pkg-config --cflags wayland-scanner || true

          echo
          echo "========== libs =========="
          pkg-config --libs wayland-scanner || true

          echo
          echo "========== ALL .pc FILES =========="
          find /usr -name "wayland-scanner.pc" -exec sh -c '
            echo
            echo "----- $1 -----"
            cat "$1"
          ' sh {} \;

          echo
          echo "========== Installed scanner =========="
          find /usr/local -name "wayland-scanner*"

          echo
          echo "========== Installed pc =========="
          find /usr/local -name "*.pc"

      - name: Test pkg-config manually
        run: |

          echo "===== DEFAULT ====="
          pkg-config --modversion wayland-scanner || true

          echo
          echo "===== /usr/local/lib/pkgconfig ====="
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig \
          pkg-config --modversion wayland-scanner || true

          echo
          echo "===== /usr/local/share/pkgconfig ====="
          PKG_CONFIG_PATH=/usr/local/share/pkgconfig \
          pkg-config --modversion wayland-scanner || true

          echo
          echo "===== BOTH ====="
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig \
          pkg-config --modversion wayland-scanner || true
