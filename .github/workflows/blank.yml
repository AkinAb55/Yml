name: Build wlroots-android-bridge APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Кнопка для ручного запуска в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Подгружаем TermuxAm и tinywl модули

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK r28
      run: |
        sdkmanager --install "ndk;28.0.12433566"
        # Указываем пути к NDK для CMake, который зашит в Gradle проекта
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" >> $GITHUB_ENV
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/28.0.12433566" > local.properties

    - name: Grant execute permission for gradlew
      run: |
        # Проверяем наличие файла перед выдачей прав (защита от ошибок)
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        else
          echo "Скрипт gradlew не найден в корне, генерируем заново..."
          gradle wrapper
          chmod +x ./gradlew
        fi

    - name: Build Android APK via Gradle
      run: |
        # Запуск сборки отладочного APK. Gradle сам скомпилирует встроенный CMake-код.
        ./gradlew assembleDebug --stacktrace

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wlroots-android-bridge-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
