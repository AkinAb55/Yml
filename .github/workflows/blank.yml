name: TAWC REAL NO-LEAK GRAPH TEST (Wayland/XCB/XWayland)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      PKG_CONFIG_ALLOW_CROSS: "1"
      WAYLAND_SCANNER: /usr/local/bin/wayland-scanner

    steps:

    # =========================
    # 1. Checkout
    # =========================
    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: wmww/tawc
        submodules: recursive

    # =========================
    # 2. Host deps (STRICT)
    # =========================
    - name: Install build deps
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential meson ninja-build pkg-config \
          autoconf automake libtool m4 gettext \
          python3 curl git \
          libx11-dev libx11-xcb-dev libxcb1-dev \
          libxau-dev libxext-dev libxrender-dev \
          libpixman-1-dev libdrm-dev libffi-dev

    # =========================
    # 3. Wayland SCANNER (BUILD MACHINE)
    # =========================
    - name: Build host Wayland 1.25 scanner (NO LEAK)
      run: |
        rm -rf /tmp/wayland
        curl -L https://gitlab.freedesktop.org/wayland/wayland/-/archive/1.25.0/wayland-1.25.0.tar.gz | tar -xz -C /tmp
        mv /tmp/wayland-1.25.0 /tmp/wayland

        meson setup /tmp/wayland/build /tmp/wayland \
          --prefix=/usr/local \
          -Dtests=false \
          -Ddocumentation=false \
          -Dlibraries=false

        ninja -C /tmp/wayland/build
        sudo ninja -C /tmp/wayland/build install

        echo "=== HOST SCANNER ==="
        which wayland-scanner
        wayland-scanner --version
        pkg-config --modversion wayland-scanner || true

    # =========================
    # 4. Android NDK
    # =========================
    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;27.2.12479018"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

    # =========================
    # 5. SYSROOT CLEAN CROSS FILE (NO LEAK)
    # =========================
    - name: Generate strict Meson cross file
      run: |
        mkdir -p build

        cat > build/android-cross.txt << 'EOF'
        [binaries]
        c = '/usr/local/lib/android/sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang'
        cpp = '/usr/local/lib/android/sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang++'
        ar = '/usr/local/lib/android/sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
        strip = '/usr/local/lib/android/sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
        pkg-config = 'pkg-config'

        [properties]
        needs_exe_wrapper = true
        pkg_config_libdir = ''

        [host_machine]
        system = 'android'
        cpu_family = 'aarch64'
        cpu = 'aarch64'
        endian = 'little'
        EOF

    # =========================
    # 6. VERIFY LEAK CONTROL
    # =========================
    - name: Verify no host leak
      run: |
        echo "WAYLAND_SCANNER:"
        which wayland-scanner

        echo "PKG CONFIG PATH:"
        echo $PKG_CONFIG_PATH

        pkg-config --modversion wayland-scanner || true

    # =========================
    # 7. BUILD GRAPH LAYER (WAYLAND)
    # =========================
    - name: Build Wayland (Android-safe)
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig"

        meson setup build-wayland deps/xwayland-src/wayland/src \
          --cross-file build/android-cross.txt \
          --prefix=/tmp/sysroot \
          --buildtype=debug \
          -Dtests=false \
          -Ddocumentation=false \
          -Ddtd_validation=false \
          -Dscanner=false \
          -Dlibraries=true \
          --wipe

        ninja -C build-wayland install

    # =========================
    # 8. BUILD XCB STACK
    # =========================
    - name: Build XCB core
      run: |
        export PKG_CONFIG_PATH=/tmp/sysroot/lib/pkgconfig:/tmp/sysroot/share/pkgconfig

        for m in xcb-proto libxcb libxau libx11; do
          echo "== BUILD $m =="
          meson setup build-$m deps/xwayland-src/$m \
            --cross-file build/android-cross.txt \
            --prefix=/tmp/sysroot \
            --buildtype=debug \
            --wipe || true

          ninja -C build-$m install || true
        done

    # =========================
    # 9. XWAYLAND BUILD
    # =========================
    - name: Build Xwayland (final graph)
      run: |
        export PKG_CONFIG_PATH=/tmp/sysroot/lib/pkgconfig:/tmp/sysroot/share/pkgconfig
        export WAYLAND_SCANNER=/usr/local/bin/wayland-scanner

        meson setup build-xwayland deps/xwayland-src/xwayland \
          --cross-file build/android-cross.txt \
          --prefix=/tmp/sysroot \
          --buildtype=debug \
          -Dxvfb=false \
          -Dglamor=false \
          -Dxwayland=true \
          --wipe || true

        ninja -C build-xwayland install || true

    # =========================
    # 10. FINAL DIAGNOSTICS (IMPORTANT)
    # =========================
    - name: VERIFY OUTPUT GRAPH
      if: always()
      run: |
        echo "========== SYSROOT =========="
        find /tmp/sysroot -name "*.pc" -print -exec cat {} \;

        echo "========== LIBS =========="
        find /tmp/sysroot -name "*.so*" -ls

        echo "========== WAYLAND CHECK =========="
        pkg-config --modversion wayland-client || true
        pkg-config --modversion wayland-server || true
        pkg-config --modversion wayland-egl || true

        echo "========== SCANNER =========="
        wayland-scanner --version
