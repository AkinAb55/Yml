name: Build Android App

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем оригинальный репозиторий (ветка main)
      - name: Clone Original Repository
        uses: actions/checkout@v4
        with:
          repository: 'ailoadtech/countit_app'
          ref: 'main'

      # 2. Устанавливаем Java (необходима для сборщика Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Устанавливаем актуальную стабильную версию Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Получаем зависимости, которые прописаны в самом проекте
      - name: Install Dependencies
        run: flutter pub get

      # 5. Запускаем сборку APK «как есть» из исходников оригинала
      - name: Build Android APK
        run: flutter build apk --release

      # 6. Сохраняем готовый файл, чтобы вы могли его скачать
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: countit-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
