name: Build External Android App

on:
  workflow_dispatch: # запуск вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из внешнего репозитория
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: 'malsmak372-cmyk/vidi-ai-ultimate-editor'
        ref: 'main' # если ветка master, замените на master

    # 2. Устанавливаем JDK 8 (совместим с Gradle и SDK 29)
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. Настраиваем Android SDK (API 29, Build Tools 29.0.3)
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 29
        build-tools: 29.0.3
        target: default
        arch: x86_64

    # 4. Проверяем наличие Gradle Wrapper и даём права
    - name: Ensure Gradle Wrapper
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    # 5. Собираем Debug APK (Release без ключа подписи упадёт)
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # 6. Загружаем APK как артефакт
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-apks
        path: app/build/outputs/apk/debug/*.apk
        
