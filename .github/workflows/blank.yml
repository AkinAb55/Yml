name: Build WinDroidPro APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Clone WinDroidPro
      run: git clone https://github.com/esooLsIeicuJehT/WinDroidPro.git

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK + CMake
      run: sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"

    - name: Install Gradle 8.5
      run: |
        wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip gradle-8.5-bin.zip
        mv gradle-8.5 gradle
        echo "$(pwd)/gradle/bin" >> $GITHUB_PATH

    - name: Patch repositories (add JitPack)
      run: |
        sed -i '/mavenCentral()/a\        maven { url "https://jitpack.io" }' WinDroidPro/WinDroidPro/build.gradle
        sed -i '/mavenCentral()/a\        maven { url "https://jitpack.io" }' WinDroidPro/WinDroidPro/settings.gradle || true

    - name: Build Debug APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Debug
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Release
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: Patch settings.gradle (remove jcenter)
      run: sed -i 's/jcenter()/mavenCentral()/g' WinDroidPro/WinDroidPro/settings.gradle || true

    - name: Build Debug APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Debug
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Release
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: Build Debug APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Debug
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Release
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/release/*.apk
        retention-days: 30
        
