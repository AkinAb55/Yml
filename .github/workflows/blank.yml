name: Build WinDroidPro APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Clone WinDroidPro
      run: git clone https://github.com/esooLsIeicuJehT/WinDroidPro.git

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle
      uses: gradle/gradle-build-action@v2

    - name: Patch settings.gradle (remove jcenter)
      run: sed -i 's/jcenter()/mavenCentral()/g' WinDroidPro/WinDroidPro/settings.gradle

    - name: Build Debug APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Debug
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: cd WinDroidPro/WinDroidPro && gradle assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WinDroidPro-Release
        path: WinDroidPro/WinDroidPro/app/build/outputs/apk/release/*.apk
        retention-days: 30
        
