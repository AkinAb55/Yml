name: Debug TAWC Xwayland Only
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'          # Автоматический запуск каждую ночь в 02:00 UTC
  workflow_dispatch:            # Кнопка ручного запуска в интерфейсе GitHub

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"

jobs:
  test-xwayland-fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TAWC Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          submodules: recursive

      - name: Install Host Build Tools & Autotools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake meson ninja-build pkg-config \
            autoconf automake libtool libtool-bin m4 gettext bison flex \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu curl tar

      - name: Setup Android NDK via SDKManager
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          REAL_NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$REAL_NDK_PATH" ]; then REAL_NDK_PATH="$ANDROID_HOME/ndk-bundle"; fi
          echo "ANDROID_NDK_HOME=$REAL_NDK_PATH" >> $GITHUB_ENV

      - name: Compile Native wayland-scanner v1.25.0 for Host
        run: |
          # 1. Клонируем ту же версию Wayland, что используется в проекте
          git clone --branch 1.25.0 https://gitlab.freedesktop.org/wayland/wayland.git /tmp/wayland-host
          
          # 2. Настраиваем конфигурацию и компилируем
          meson setup /tmp/wayland-host/build /tmp/wayland-host -Ddocumentation=false -Dtests=false
          ninja -C /tmp/wayland-host/build
          
          # 3. Создаем изолированную папку бинарников для раннера
          mkdir -p /home/runner/bin
          
          # 4. Копируем скомпилированный сканер в наш PATH
          cp /tmp/wayland-host/build/src/wayland-scanner /home/runner/bin/wayland-scanner
          chmod +x /home/runner/bin/wayland-scanner
          
          # 5. Копируем .pc файл из директории генерации Meson (meson-private)
          mkdir -p /home/runner/pkgconfig
          cp /tmp/wayland-host/build/meson-private/wayland-scanner.pc /home/runner/pkgconfig/wayland-scanner.pc
          
          # Подменяем путь к бинарнику внутри самого .pc файла, чтобы он указывал на наш новый сканер
          sed -i 's|wayland_scanner=.*|wayland_scanner=/home/runner/bin/wayland-scanner|g' /home/runner/pkgconfig/wayland-scanner.pc

          # Экспортируем пути в глобальное окружение GitHub Actions
          echo "/home/runner/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=/home/runner/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Upgrade libffi and Hotfix build script
        run: |
          # 1. Переключаем манифест TAWC на сборку libffi v3.6.0
          sed -i 's|e2eda0cf72a0598b44278cc91860ea402273fa29\tv3.5.2|f6303b8b0dd6353c6a5bb4de2e855a13b86f22cf\tv3.6.0|g' deps/deps.list

          # 2. Безопасная модификация configure.ac для libffi
          sed -i '/build_autotools libffi/i \  sed -i "s|LT_SYS_SYMBOL_USCORE|sys_symbol_underscore=no|g" deps/xwayland-src/libffi/configure.ac' scripts/build-xwayland.sh

          echo "=== Проверка инъекции патча в скрипт сборки ==="
          grep -C 3 "build_autotools libffi" scripts/build-xwayland.sh

      - name: Fix Autotools Environment Globally
        run: |
          echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
          echo "VERBOSE=1" >> $GITHUB_ENV

      - name: Run TAWC Xwayland Build (Trace Mode)
        run: |
          find . -name "*.sh" -exec chmod +x {} + 2>/dev/null || true
          
          export ANDROID_NDK_HOME="${{ env.ANDROID_NDK_HOME }}"
          bash -x scripts/build-xwayland.sh --abi=aarch64
