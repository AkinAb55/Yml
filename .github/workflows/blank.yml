name: Build Android & Web Projects

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - name: countit_app
            repo: https://github.com/ailoadtech/countit_app.git
            type: flutter
            java-version: '17'
            root_dir: '.'

          - name: PixelSpark
            repo: https://github.com/Ehtasham-Arif01/PixelSpark.git
            type: flutter
            java-version: '17'
            root_dir: '.'

          - name: DeepRazor
            repo: https://github.com/ShubhamKNIT/DeepRazor.git
            type: android
            java-version: '17'
            root_dir: 'DeepRazor App' # Исправлено: Gradle лежит в этой подпапке

          - name: photo-ai-tools
            repo: https://github.com/DikshantArora28/photo-ai-tools.git
            type: nextjs             # Исправлено: это веб-проект, а не flutter
            java-version: '17'
            root_dir: '.'

          - name: Gemini-AI-KMP-App
            repo: https://github.com/Coding-Meet/Gemini-AI-KMP-App.git
            type: kmp
            java-version: '17'
            root_dir: '.'

          - name: Virtual-Container-for-Android
            repo: https://github.com/vishal-benake/Virtual-Container-for-Android.git
            type: android
            java-version: '11'       # Исправлено: старый Gradle 6.5 требует Java 11 (вместо 17)
            root_dir: '.'

    steps:
      - name: Checkout runner repo
        uses: actions/checkout@v4

      # Динамически устанавливаем нужную версию Java для конкретного проекта
      - name: Install Java ${{ matrix.project.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.project.java-version }}

      - name: Setup Android SDK
        if: matrix.project.type != 'nextjs'
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        if: matrix.project.type != 'nextjs'
        run: yes | sdkmanager --licenses

      - name: Install Android packages
        if: matrix.project.type != 'nextjs'
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;26.3.11579264"

      - name: Setup Flutter
        if: matrix.project.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node.js (Only for photo-ai-tools)
        if: matrix.project.type == 'nextjs'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone project
        run: |
          git clone --recursive ${{ matrix.project.repo }} project

      # Создаем заглушку ключа для Gemini KMP приложения, чтобы сборка не падала
      - name: Prepare Gemini KMP Properties
        if: matrix.project.name == 'Gemini-AI-KMP-App'
        run: |
          echo "GEMINI_API_KEY=mock_key_for_ci_build" >> project/local.properties

      - name: Grant gradlew permissions
        if: matrix.project.type == 'android' || matrix.project.type == 'kmp' || matrix.project.type == 'flutter'
        run: |
          cd project/"${{ matrix.project.root_dir }}"
          find . -name gradlew -exec chmod +x {} \; || true

      # --- СЦЕНАРИЙ 1: СБОРКА FLUTTER (countit_app, PixelSpark) ---
      - name: Build Flutter APK
        if: matrix.project.type == 'flutter'
        run: |
          cd project/"${{ matrix.project.root_dir }}"
          flutter pub get
          flutter build apk --release

      # --- СЦЕНАРИЙ 2: СБОРКА NATIVE ANDROID / KMP ---
      - name: Build Gradle project
        if: matrix.project.type == 'android' || matrix.project.type == 'kmp'
        run: |
          cd project/"${{ matrix.project.root_dir }}"
          if [ -f "./gradlew" ]; then
            ./gradlew assembleRelease --stacktrace --no-daemon
          else
            gradle assembleRelease --stacktrace --no-daemon
          fi

      # --- СЦЕНАРИЙ 3: СБОРКА WEB NEXT.JS (photo-ai-tools) ---
      - name: Build Next.js Web App
        if: matrix.project.type == 'nextjs'
        env:
          NEXT_PUBLIC_SITE_URL: "https://localhost:3000"
          DATABASE_URL: "postgresql://mock:mock@localhost:5432/mock"
        run: |
          cd project/"${{ matrix.project.root_dir }}"
          npm install --legacy-peer-deps
          npm run build

      # --- СБОР И СОХРАНЕНИЕ РЕЗУЛЬТАТОВ ---
      - name: Collect Android Artifacts (APK/AAB)
        if: matrix.project.type != 'nextjs'
        run: |
          mkdir -p artifacts
          find project -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} artifacts/ \; || true

      - name: Collect Web Artifacts (Next.js Build)
        if: matrix.project.type == 'nextjs'
        run: |
          mkdir -p artifacts
          cp -r project/.next artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-build
          path: artifacts/
