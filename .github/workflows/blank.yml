name: TAWC — Fast Smoke Test Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_COMPILE_SDK: "36"
  TAWC_ABIS: "arm64-v8a" # Только одна архитектура для скорости

jobs:
  fast-test-build:
    name: Quick Build (CPU Only)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: 'wmww/tawc'
          ref: 'main'
          fetch-depth: 1 # Скачиваем только последний коммит для экономии времени
          submodules: recursive # Обязательно для Rust-зависимостей вроде kumquat_virtio

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git pkg-config curl unzip rsync \
            meson ninja-build bison flex
        shell: bash

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}
          components: |
            platform-tools
            "platforms;android-${{ env.ANDROID_COMPILE_SDK }}"
            "build-tools;36.0.0"
            "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Setup Basic Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android
          cargo install --locked cargo-ndk
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Run Fast Gradle Build
        run: |
          export ANDROID_NDK_HOME="${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          export ANDROID_SDK_ROOT="${{ env.ANDROID_HOME }}"
          
          ./gradlew assembleDebug \
            -PtawcAbis=${{ env.TAWC_ABIS }} \
            -PtawcMethods=tawcroot,proot \
            -PtawcGraphics=cpu \
            -PtawcXwayland=false \
            --no-daemon
        shell: bash

      - name: Upload Test APK
        uses: actions/upload-artifact@v4
        with:
          name: tawc-fast-test-apk
          path: app/build/outputs/apk/debug/app-debug.apk
