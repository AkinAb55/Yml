name: buildXwaylandArm64-v8a

on:
  workflow_dispatch:

jobs:
  buildXwaylandArm64-v8a:
    runs-on: ubuntu-24.04

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            meson \
            ninja-build \
            pkg-config \
            autoconf \
            automake \
            libtool \
            xsltproc \
            libxml2-utils \
            python3 \
            python3-pip \
            git \
            curl \
            perl \
            bison \
            flex \
            gettext \
            texinfo \
            gperf

      - name: Install Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        shell: bash
        run: |
          set -eux

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.13846066"

          NDK=$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 | sort -V | tail -1)

          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"

      - name: Environment
        shell: bash
        run: |
          set -x

          env | sort

          echo
          echo "===== NDK ====="

          ls -R "$ANDROID_NDK_HOME"

          echo
          echo "===== compiler ====="

          find "$ANDROID_NDK_HOME/toolchains" -name '*clang' | head -50

      - name: Build
        shell: bash
        continue-on-error: true
        run: |
          set -xe

          chmod +x scripts/*.sh || true

          bash scripts/build-xwayland.sh --abi=arm64-v8a

      - name: Dump build tree
        if: always()
        shell: bash
        run: |
          set +e

          echo
          echo "===== BUILD TREE ====="

          find build | sort

          echo
          echo "===== DEPS ====="

          find deps | head -1000

      - name: config.log
        if: always()
        shell: bash
        run: |
          set +e

          echo
          echo "===== CONFIG.LOG ====="

          find . -name config.log | while read f
          do
              echo
              echo "############################################"
              echo "$f"
              echo "############################################"
              cat "$f"
          done

      - name: meson logs
        if: always()
        shell: bash
        run: |
          set +e

          find . -name meson-log.txt | while read f
          do
              echo
              echo "############################################"
              echo "$f"
              echo "############################################"
              cat "$f"
          done

      - name: build.ninja
        if: always()
        shell: bash
        run: |
          set +e

          find . -name build.ninja | while read f
          do
              echo
              echo "############################################"
              echo "$f"
              echo "############################################"
              head -300 "$f"
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwayland-debug
          path: |
            build/**
            deps/**
