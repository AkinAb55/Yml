name: Automated Windows Build WayLandIE
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    # 1. Клонируем сторонний репозиторий AstroCODEsky
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'AstroCODEsky/WayLandIE'
        ref: 'main'
        submodules: 'recursive'

    # 2. Настраиваем Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Настраиваем Android SDK и NDK (автоматически ставит актуальную версию r27)
    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    # 4. Адаптируем окружение SDK, лечим заголовки и снижаем min-sdk до Android 12
    - name: Fix SDK Paths, Patch Header & Downgrade to Android 12
      shell: pwsh
      run: |
        # 1. Исправляем пути SDK через Junction ссылки для версии 36.1.0
        $ActualBuildToolsDir = Get-ChildItem -Path "$env:ANDROID_HOME\build-tools" -Directory |
                                Sort-Object Name -Descending |
                                Select-Object -First 1
                
        $ActualPlatformDir = Get-ChildItem -Path "$env:ANDROID_HOME\platforms" -Directory |
                              Sort-Object Name -Descending |
                              Select-Object -First 1
        
        $FakeBuildToolsPath = Join-Path "$env:ANDROID_HOME\build-tools" "36.1.0"
        if (-not (Test-Path $FakeBuildToolsPath)) {
            New-Item -ItemType Junction -Path $FakeBuildToolsPath -Value $ActualBuildToolsDir.FullName
        }
        
        $FakePlatformPath = Join-Path "$env:ANDROID_HOME\platforms" "android-36"
        if (-not (Test-Path $FakePlatformPath)) {
            New-Item -ItemType Junction -Path $FakePlatformPath -Value $ActualPlatformDir.FullName
        }

        # 2. КОМПЛЕКСНОЕ ЛЕЧЕНИЕ SURFACE_CONTROL.H (баги Google)
        $TargetHeader = Get-ChildItem -Path "$env:ANDROID_HOME\ndk" -Recurse -Filter "surface_control.h" | Select-Object -First 1
        
        if ($TargetHeader) {
            Write-Host "Найдено оригинальный заголовочный файл NDK по пути: $($TargetHeader.FullName)"
            $Content = Get-Content $TargetHeader.FullName -Raw
            
            # Исправляем ВСЕ ошибочные C++ ссылки (const ARect& ...) на Си-указатели (const ARect* ...)
            Write-Host "Патчим опечатки Google в объявлениях ARect..."
            $Content = $Content -replace 'const ARect&\s+crop', 'const ARect* crop'
            $Content = $Content -replace 'const ARect&\s+source', 'const ARect* source'
            $Content = $Content -replace 'const ARect&\s+destination', 'const ARect* destination'
            
            # Добавляем старый макрос/typedef для OnBufferRelease
            if ($Content -notmatch 'ASurfaceTransaction_OnBufferRelease') {
                Write-Host "Добавляем обратную совместимость для ASurfaceTransaction_OnBufferRelease..."
                $InjectTypedef = "`n// Хак для совместимости со старым кодом автора`ntypedef void (*ASurfaceTransaction_OnBufferRelease)(void* context, int fence);`n"
                $Content = $Content -replace '(#ifndef ANDROID_SURFACE_CONTROL_H)', "`$1`r`n$InjectTypedef"
            }
            Set-Content -Path $TargetHeader.FullName -Value $Content -Encoding UTF8
        }

        # 3. СНИЖАЕМ МИНИМАЛЬНУЮ ВЕРСИЮ ANDROID ДО 12 (API 31)
        $AuthScriptPath = "android-app\tools\build-apk.ps1"
        if (Test-Path $AuthScriptPath) {
            Write-Host "Патчим скрипт автора для поддержки Android 12 (API 31)..."
            $ScriptContent = Get-Content $AuthScriptPath -Raw
            
            # Меняем аргументы запуска AAPT2 (--min-sdk-version 33 на 31)
            $ScriptContent = $ScriptContent -replace '--min-sdk-version 33', '--min-sdk-version 31'
            
            # Меняем аргументы запуска D8 (--min-api 33 на 31)
            $ScriptContent = $ScriptContent -replace '--min-api 33', '--min-api 31'
            
            Set-Content -Path $AuthScriptPath -Value $ScriptContent -Encoding UTF8
            Write-Host "Скрипт автора успешно адаптирован под Android 12!"
        }

    # 5. Запускаем оригинальный PowerShell скрипт автора
    - name: Build APK via Author's PowerShell Script
      shell: pwsh
      run: |
        cd android-app
        .\tools\build-apk.ps1 `
          -RequireNative `
          -NdkRoot "$env:ANDROID_NDK_ROOT" `
          -SdkRoot "$env:ANDROID_HOME"

    # 6. Собираем финальный бандл
    - name: Prepare Release Bundle
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .\release-dist\android-app
        New-Item -ItemType Directory -Force -Path .\release-dist\linux-runtime
        New-Item -ItemType Directory -Force -Path .\release-dist\scripts
                
        Copy-Item -Path .\android-app\out\waylandie-display-mvp.apk -Destination .\release-dist\android-app\
        Copy-Item -Recurse -Force -Path .\linux-runtime\* -Destination .\release-dist\linux-runtime\
        Copy-Item -Recurse -Force -Path .\scripts\* -Destination .\release-dist\scripts\
        if (Test-Path .\README.md) { Copy-Item -Path .\README.md -Destination .\release-dist\ }
                
        Write-Host "=== Содержимое бандла ==="
        Get-ChildItem -Path .\release-dist -Recurse

    # 7. Публикация готового архива
    - name: Upload Complete WayLandIE Bundle
      uses: actions/upload-artifact@v4
      with:
        name: WayLandIE-WindowsCompiled-Bundle
        path: .\release-dist\
