name: Build HackThe6ix

on:
  workflow_dispatch:  # ручной запуск

# Можно добавить push, если нужно:
#  push:
#    branches: [ main, master ]
#    paths:
#      - '**.kt'
#      - '**.gradle'
#      - '**.xml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ← Важно! Не git clone вручную

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build project
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/*.apk   # ← чаще всего APK лежит здесь
          if-no-files-found: error
